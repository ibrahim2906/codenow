                        <LessonPart title={<>The Diamond Problem & Virtual Inheritance <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">مشكلة الماس والوراثة الافتراضية</span></>} icon={Icons.AlertTriangle}>
                            <p>
                                If B and C inherit from A, and D inherits from B and C, then D has TWO copies of A! This is the Diamond Problem.
                                <br />Solution: Use <code>virtual public A</code> when inheriting B and C.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    إذا ورث B و C من A، وورث D من B و C، فإن D يمتلك نسختين من A! هذه هي مشكلة الماس.
                                    <br />الحل: استخدم <code>virtual public A</code> عند وراثة B و C.
                                </span>
                            </p>
                            <CodeBlock title="VirtualInheritance.cpp" code={`class A { public: int x; };
class B : virtual public A { }; // Virtual is key
class C : virtual public A { };
class D : public B, public C { }; // D has only ONE copy of 'x'`} />
                        </LessonPart>

                        <LessonPart title={<>Example: Multilevel Inheritance <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">مثال: الوراثة متعددة المستويات</span></>} icon={Icons.Code}>
                            <p>
                                Let's build a chain: <strong>Vehicle &rarr; Car &rarr; SportsCar</strong>. Each level adds more specific features.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    لنبنِ سلسلة: <strong>مركبة &rarr; سيارة &rarr; سيارة رياضية</strong>. كل مستوى يضيف ميزات أكثر تحديداً.
                                </span>
                            </p>
                            <CodeBlock title="Multilevel.cpp" code={`class Vehicle {
public:
    void startEngine() { cout << "Engine started." << endl; }
};

class Car : public Vehicle {
public:
    void openTrunk() { cout << "Trunk opened." << endl; }
};

class SportsCar : public Car {
public:
    void turboBoost() { cout << "Turbo activated! Vroom!" << endl; }
};

int main() {
    SportsCar myFerrari;
    myFerrari.startEngine(); // From Grandparent (Vehicle)

}`} />
                        </LessonPart>

                        <LessonPart title={<>Example: Multiple Inheritance <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">مثال: الوراثة المتعددة</span></>} icon={Icons.Zap}>

                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    تسمح C++ للفئة بأن ترث من عدة آباء. هذا قوي ولكنه خطير (التعقيد).
                                    هنا <strong>سيارة هجينة (HybridCar)</strong> ترث من كلاً من <strong>مصدر غاز (GasSource)</strong> و <strong>مصدر كهرباء (ElectricSource)</strong>.
                                </span>
                            </p>
                            <CodeBlock title="MultipleInheritance.cpp" code={`class GasSource {
public:
    void refillGas() { cout << "Gas tank full." << endl; }
};

class ElectricSource {
public:
    void chargeBattery() { cout << "Battery charged." << endl; }
};

// Inherit from BOTH
class HybridCar : public GasSource, public ElectricSource {
public:
    void drive() { cout << "Driving hybrid..." << endl; }
};

int main() {

    prius.refillGas();      // From Parent 1
    prius.chargeBattery();  // From Parent 2

}`} />
                        </LessonPart>

                        <LessonPart title={<>Object Slicing: The Silent Killer <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">قص الكائن: القاتل الصامت</span></>} icon={Icons.AlertTriangle}>
                            <p>
                                If you assign a Derived object to a Base variable (not a pointer/reference), C++ "slices off" the derived parts to make it fit.
                                You lose all the extra data and behavior!
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    إذا قمت بتعيين كائن مشتق لمتغير أساسي (ليس مؤشراً أو مرجعاً)، تقوم C++ "بقص" الأجزاء المشتقة لجعله مناسباً.
                                    تفقد كل البيانات والسلوك الإضافي!
                                </span>
                            </p>
                            <CodeBlock title="Slicing.cpp" code={`class Base { int x; };
class Derived : public Base { int y; };

void func(Base b) { 
    // 'b' is just a Base. 'y' is gone forever.
}

int main() {
    Derived d;
    func(d); // Object Slicing happens here!
}`} />
                        </LessonPart>

                        <LessonPart title={<>What is Polymorphism? <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">ما هو تعدد الأشكال؟</span></>} icon={Icons.Book}>

                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">

                        <LessonPart title={<>1. Compile-Time: Function Overloading <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">1. وقت الترجمة: التحميل الزائد للدوال</span></>} icon={Icons.Terminal}>
                            <p>
                                You can have multiple functions with the <strong>same name</strong> but <strong>different parameters</strong>.
                                The compiler picks the right one matching your arguments.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    يمكن أن يكون لديك عدة دوال بـ <strong>نفس الاسم</strong> ولكن <strong>بمعاملات مختلفة</strong>.
                                    يختار المترجم الدالة الصحيحة المتطابقة مع حججك.
                                </span>
                            </p>
                            <CodeBlock title="Overloading.cpp" code={`class Printer {
public:
    void print(int i) {
        cout << "Printing Integer: " << i << endl;
    }
    
    void print(double d) {
        cout << "Printing Double: " << d << endl;
    }
    
    void print(string s) {
        cout << "Printing String: " << s << endl;
    }
};

int main() {
    Printer p;
    p.print(42);      // Calls print(int)
    p.print(3.14);    // Calls print(double)
    p.print("Hello"); // Calls print(string)

                        <LessonPart title={<>How It Works: The V-Table <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">كيف يعمل: الجدول الافتراضي</span></>} icon={Icons.Settings}>
                            <p>
                                When a class has a <code>virtual</code> function, the compiler secretly adds a pointer (vptr) to the object.
                                This pointer points to a table (V-Table) containing addresses of the correct functions.
                                This is why Polymorphism has a tiny performance cost.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    عندما تحتوي فئة على دالة <code>virtual</code>، يضيف المترجم سراً مؤشراً (vptr) للكائن.
                                    يشير هذا المؤشر إلى جدول (V-Table) يحتوي على عناوين الدوال الصحيحة.
                                    لهذا السبب تعدد الأشكال له تكلفة أداء صغيرة جداً.
                                </span>
                            </p>
                            <div className="bg-slate-900 p-4 rounded border border-slate-700 font-mono text-xs text-slate-300 mt-2">
                                [Object Dog] <br />
                                | vptr | ----&gt; [Dog V-Table] <br />
                                | name |        | &speak() -&gt; Dog::speak <br />
                                | .... |        | &eat()   -&gt; Animal::eat
                            </div>
                        </LessonPart>

                        <LessonPart title={<>2. Runtime: Virtual Functions <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">2. وقت التشغيل: الدوال الافتراضية</span></>} icon={Icons.RefreshCw}>
                            <p>
                                This is the "True OOP" polymorphism. A Base pointer can point to a Child object.
                                Without <code>virtual</code>, C++ calls the Base version. With <code>virtual</code>, it calls the Child version.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    هذا هو تعدد الأشكال "الحقيقي في OOP". يمكن لمؤشر الأساس أن يشير إلى كائن ابن.
                                    بدون <code>virtual</code>، تستدعي C++ نسخة الأساس. مع <code>virtual</code>، تستدعي نسخة الابن.
                                </span>
                            </p>
                            <p className="mt-2 text-sm text-slate-400">
                                <strong>The V-Table:</strong> The compiler builds a hidden table of function pointers.
                                When you call <code>ptr&rarr;speak()</code>, the program looks inside the object at runtime to find the correct function address.
                                <br />
                                <span className="block text-emerald-400 text-right mt-1" dir="rtl">
                                    <strong>جدول V-Table:</strong> يبني المترجم جدولاً مخفياً لمؤشرات الدوال.
                                    عندما تستدعي <code>ptr&rarr;speak()</code>، ينظر البرنامج داخل الكائن أثناء التشغيل للعثور على عنوان الدالة الصحيح.
                                </span>
                            </p>
                            <CodeBlock title="RuntimePoly.cpp" code={`class Animal {
public:
    // "virtual" tells C++: "Wait until runtime to decide"
    virtual void speak() { cout << "???" << endl; }
};

class Dog : public Animal {
public:
    void speak() override { cout << "Woof!" << endl; }
};

class Cat : public Animal {
public:
    void speak() override { cout << "Meow!" << endl; }
};

int main() {
    // Array of pointers to Base Class
    Animal* zoo[2];
    
    zoo[0] = new Dog(); // Upcasting
    zoo[1] = new Cat();
    
    for(int i=0; i<2; i++) {
        zoo[i]->speak(); // Runtime Magic!
        // i=0 -> Prints "Woof!"
        // i=1 -> Prints "Meow!"
    }
}`} />
                        </LessonPart>

                        <LessonPart title={<>The 'final' Keyword <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">كلمة 'final' المحجوزة</span></>} icon={Icons.Lock}>
                            <p>
                                Sometimes you want to STOP inheritance or STOP overriding.
                                Use <code>final</code> to prevent further modification.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    أحياناً تريد إيقاف الوراثة أو إيقاف التجاوز (overriding).
                                    استخدم <code>final</code> لمنع المزيد من التعديل.
                                </span>
                            </p>
                            <CodeBlock title="Final.cpp" code={`class Base {
    virtual void func() final; // No one can override this
};

class LastClass final : public Base {
    // No one can inherit from LastClass
};`} />
                        </LessonPart>

                        <LessonPart title={<>Safety: Virtual Destructors <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">الأمان: الهادمات الافتراضية</span></>} icon={Icons.Shield}>
                            <p>
                                <strong>CRITICAL RULE:</strong> If a class has ANY virtual functions, it MUST have a virtual destructor.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    <strong>قاعدة حرجة:</strong> إذا كان للفئة أي دوال افتراضية (virtual functions)، فيجب أن يكون لها هادم افتراضي (virtual destructor).
                                </span>
                            </p>
                            <p className="mt-2 text-slate-400 text-sm">
                                If you `delete` a Child object through a Parent pointer, and the Parent destructor is NOT virtual, the Child's destructor will NEVER run. This causes memory leaks.
                                <br />
                                <span className="block text-emerald-400 text-right mt-1" dir="rtl">
                                    إذا قمت بـ `delete` لكائن ابن من خلال مؤشر أب، وكان هادم الأب ليس افتراضياً، فلن يعمل هادم الابن أبداً. هذا يسبب تسرب ذاكرة.
                                </span>
                            </p>
                            <CodeBlock title="VirtualDestructor.cpp" code={`class Base {
public:
    // correct:
    virtual ~Base() { cout << "Base destroyed"; }
    
    // wrong (memory leak risk):
    // ~Base() { cout << "Base destroyed"; } 
};

class Child : public Base {
    int* data;
public:
    Child() { data = new int[100]; }
    ~Child() { 
        delete[] data; 
        cout << "Child destroyed"; 
    }
};

int main() {
    Base* ptr = new Child();
    delete ptr; 
    // If usage of virtual ~Base():
    // 1. ~Child() runs (Memory freed)
    // 2. ~Base() runs
    
    // If NO virtual ~Base():
    // 1. ~Base() runs
    // 2. ~Child() NEVER runs -> LEAK!
}`} />
                        </LessonPart>

                        <LessonPart title={<>Advanced: Casting <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">متقدم: التحويل (Casting)</span></>} icon={Icons.GitBranch}>

                    <div className="space-y-4">

                        <LessonPart title={<>What is Function Overriding? <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">ما هو تجاوز الدوال (Function Overriding)؟</span></>} icon={Icons.Book}>
                            <p>
                                <strong>Function Overriding</strong> occurs when a <strong>derived (child) class</strong> provides its own specific implementation of a function that was already defined in its <strong>base (parent) class</strong>.
                                The child says: <em>"I know you gave me this behavior, but I want to do it MY way."</em>
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    <strong>تجاوز الدوال (Function Overriding)</strong> يحدث عندما توفر <strong>الفئة المشتقة (الابن)</strong> تنفيذها الخاص لدالة كانت معرفة بالفعل في <strong>الفئة الأساسية (الأب)</strong>.
                                    يقول الابن: <em>"أعرف أنك أعطيتني هذا السلوك، لكنني أريد أن أفعله بطريقتي."</em>
                                </span>
                            </p>
                            <p>
                                This is a core mechanism of <strong>Runtime Polymorphism</strong> in C++. Without overriding, inheritance would only allow you to <em>reuse</em> code — but with it, you can <em>customize</em> behavior for each child class.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    هذه آلية أساسية في <strong>تعدد الأشكال وقت التشغيل (Runtime Polymorphism)</strong>. بدون التجاوز، سيسمح لك الوراثة فقط بـ <em>إعادة استخدام</em> الكود — لكن معه، يمكنك <em>تخصيص</em> السلوك لكل فئة ابن.
                                </span>
                            </p>
                        </LessonPart>

                        <AnalogySection title={<>The Family Business <span className="block text-sm text-amber-500 mt-1" dir="rtl">مثال: العمل العائلي</span></>}>
                            <p>Imagine a family bakery. The father (Base Class) has a recipe for chocolate cake.</p>
                            <p className="text-right text-emerald-400" dir="rtl">تخيل مخبزاً عائلياً. الأب (الفئة الأساسية) لديه وصفة لكعكة الشوكولاتة.</p>
                            <p>His daughter (Derived Class) inherits the entire bakery — all recipes, equipment, and techniques. But she decides the chocolate cake needs <strong>more cocoa and less sugar</strong>. She <em>overrides</em> the father's recipe with her own version.</p>
                            <p className="text-right text-emerald-400" dir="rtl">ابنته (الفئة المشتقة) ترث المخبز بالكامل — كل الوصفات والمعدات والتقنيات. لكنها تقرر أن كعكة الشوكولاتة تحتاج <strong>كاكاو أكثر وسكر أقل</strong>. إنها <em>تتجاوز</em> وصفة الأب بنسختها الخاصة.</p>
                            <p className="font-bold">The recipe NAME is the same ("makeChocolateCake"), but the IMPLEMENTATION is different.</p>
                            <p className="font-bold text-right text-emerald-400" dir="rtl">اسم الوصفة هو نفسه ("makeChocolateCake")، لكن التنفيذ مختلف.</p>
                        </AnalogySection>

                            <div className="overflow-x-auto mt-4">

                                            <th className="px-4 py-2">Overriding <span className="block text-emerald-400 text-[10px]" dir="rtl">التجاوز</span></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr className="border-b border-slate-700">

                        <LessonPart title={<>1. Basic Function Overriding (Without virtual) <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">1. التجاوز الأساسي (بدون virtual)</span></>} icon={Icons.Code}>
                            <p>
                                Even without <code>virtual</code>, a child class CAN define a function with the same name as the parent.
                                But this is <strong>NOT true overriding</strong> — it is called <strong>Name Hiding</strong>.
                                The function called depends on the <em>type of the pointer/reference</em>, not the actual object.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    حتى بدون <code>virtual</code>، يمكن للفئة الابن تعريف دالة بنفس اسم الأب.
                                    لكن هذا <strong>ليس تجاوزاً حقيقياً</strong> — يسمى <strong>إخفاء الاسم (Name Hiding)</strong>.
                                    الدالة المستدعاة تعتمد على <em>نوع المؤشر/المرجع</em>، وليس الكائن الفعلي.
                                </span>
                            </p>
                            <CodeBlock title="NameHiding.cpp" code={`#include <iostream>
using namespace std;

class Animal {
public:
    void speak() {  // NOT virtual!
        cout << "Animal speaks generically." << endl;
    }
};

class Dog : public Animal {
public:
    void speak() {  // Same name — hides parent's speak()
        cout << "Dog says Woof!" << endl;
    }
};

int main() {
    Dog d;
    d.speak();  // Output: Dog says Woof! ✅ (Direct call works)

    // BUT with a pointer to base class...
    Animal* ptr = &d;
    ptr->speak();  // Output: Animal speaks generically. ❌ WRONG!
    // It calls Animal::speak() because speak() is NOT virtual.
    // The compiler looks at the POINTER TYPE, not the actual object.
}`} />
                            <p className="text-red-400 font-bold mt-2">
                                ⚠️ This is the #1 mistake. Without <code>virtual</code>, the base class version is ALWAYS called through a base pointer.
                                <span className="block text-emerald-400 text-right mt-1" dir="rtl">
                                    ⚠️ هذا هو الخطأ الأول. بدون <code>virtual</code>، يتم استدعاء نسخة الفئة الأساسية دائماً عبر مؤشر أساسي.
                                </span>
                            </p>
                        </LessonPart>

                        <LessonPart title={<>2. True Overriding with virtual <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">2. التجاوز الحقيقي باستخدام virtual</span></>} icon={Icons.Zap}>
                            <p>
                                To enable <strong>true runtime overriding</strong>, you must declare the base class function as <code>virtual</code>.
                                This tells C++ to use a <strong>Virtual Table (vTable)</strong> — a lookup table that resolves which function to call based on the <em>actual object type</em>, not the pointer type.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    لتمكين <strong>التجاوز الحقيقي وقت التشغيل</strong>، يجب أن تعلن عن دالة الفئة الأساسية كـ <code>virtual</code>.
                                    هذا يخبر C++ باستخدام <strong>جدول افتراضي (vTable)</strong> — جدول بحث يحدد أي دالة يتم استدعاؤها بناءً على <em>نوع الكائن الفعلي</em>، وليس نوع المؤشر.
                                </span>
                            </p>
                            <CodeBlock title="TrueOverriding.cpp" code={`#include <iostream>
using namespace std;

class Animal {
public:
    virtual void speak() {  // ← virtual enables true overriding
        cout << "Animal speaks generically." << endl;
    }
    virtual ~Animal() {}  // Always make destructor virtual too!
};

class Dog : public Animal {
public:
    void speak() override {  // ← override keyword (safety check)
        cout << "Dog says Woof!" << endl;
    }
};

class Cat : public Animal {
public:
    void speak() override {
        cout << "Cat says Meow!" << endl;
    }
};

int main() {
    Dog d;
    Cat c;

    Animal* ptr1 = &d;
    Animal* ptr2 = &c;

    ptr1->speak();  // Output: Dog says Woof!   ✅ Correct!
    ptr2->speak();  // Output: Cat says Meow!   ✅ Correct!
    // Now the ACTUAL OBJECT determines which function runs.
}`} />
                        </LessonPart>

                        <LessonPart title={<>3. The override Keyword (C++11) <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">3. الكلمة المحجوزة override (C++11)</span></>} icon={Icons.Shield}>
                            <p>
                                The <code>override</code> keyword was introduced in C++11 as a <strong>safety net</strong>.
                                It tells the compiler: <em>"I INTEND to override a virtual function from the base class. If I made a mistake (wrong name, wrong parameters), please give me a COMPILE ERROR instead of silently creating a new function."</em>
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    تم تقديم الكلمة المحجوزة <code>override</code> في C++11 كـ <strong>شبكة أمان</strong>.
                                    تخبر المترجم: <em>"أنا أنوي تجاوز دالة افتراضية من الفئة الأساسية. إذا أخطأت (اسم خاطئ، معاملات خاطئة)، أعطني خطأ ترجمة بدلاً من إنشاء دالة جديدة بصمت."</em>
                                </span>
                            </p>

                            <VocabCard
                                term={<>override <span className="text-sm text-purple-400 ml-2" dir="rtl">الكلمة المحجوزة override</span></>}
                                definition={<>
                                    A C++11 specifier placed AFTER the function signature in the derived class. It provides compile-time checking that the function actually overrides a virtual function in the base class.
                                    <span className="block text-emerald-400 text-right mt-2" dir="rtl">محدد من C++11 يوضع بعد توقيع الدالة في الفئة المشتقة. يوفر فحصاً وقت الترجمة للتأكد من أن الدالة تتجاوز فعلاً دالة افتراضية في الفئة الأساسية.</span>
                                </>}
                            />

                            <CodeBlock title="OverrideKeyword.cpp" code={`class Shape {
public:
    virtual double area() const { return 0; }
    virtual void draw() const { cout << "Drawing Shape" << endl; }
    virtual ~Shape() {}
};

class Circle : public Shape {
    double radius;
public:
    Circle(double r) : radius(r) {}

    // ✅ CORRECT: override confirms we are overriding area()
    double area() const override {
        return 3.14159 * radius * radius;
    }

    // ✅ CORRECT: override confirms we are overriding draw()
    void draw() const override {
        cout << "Drawing Circle with radius " << radius << endl;
    }
};

class Square : public Shape {
    double side;
public:
    Square(double s) : side(s) {}

    double area() const override {
        return side * side;
    }

    void draw() const override {
        cout << "Drawing Square with side " << side << endl;
    }
};`} />

                            <p className="mt-4">
                                <strong>Key Rule:</strong> <code>override</code> can ONLY be used if the base function is <code>virtual</code>. If it's not virtual, you'll get a compilation error.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    <strong>قاعدة أساسية:</strong> <code>override</code> يمكن استخدامها فقط إذا كانت دالة الأساس <code>virtual</code>. إذا لم تكن افتراضية، ستحصل على خطأ ترجمة.
                                </span>
                            </p>
                        </LessonPart>

                        <LessonPart title={<>4. How override Catches Bugs <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">4. كيف يلتقط override الأخطاء</span></>} icon={Icons.AlertTriangle}>
                            <p>
                                Without <code>override</code>, typos and parameter mismatches create <strong>silent bugs</strong>.
                                The compiler happily creates a NEW function instead of overriding. Your code compiles but behaves incorrectly.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    بدون <code>override</code>، الأخطاء الإملائية وعدم تطابق المعاملات تنشئ <strong>أخطاء صامتة</strong>.
                                    المترجم ينشئ دالة جديدة بسعادة بدلاً من التجاوز. الكود يُترجم لكنه يتصرف بشكل غير صحيح.
                                </span>
                            </p>
                            <CodeBlock title="BugWithout.cpp" code={`class Base {
public:
    virtual void process(int value) {
        cout << "Base processing: " << value << endl;
    }
};

// ❌ BUG: Without override, this silently creates a NEW function
class Derived1 : public Base {
public:
    void proccess(int value) {  // TYPO! 'proccess' not 'process'
        cout << "Derived processing: " << value << endl;
    }
    // This compiles fine! But Base::process() is never overridden.
    // Calling via Base* will ALWAYS call Base::process()
};

// ✅ FIX: With override, the compiler catches the typo
class Derived2 : public Base {
public:
    // void proccess(int value) override {  // ❌ COMPILE ERROR!
    //     "proccess" does not override any function in Base
    // }

    void process(int value) override {  // ✅ Correct spelling
        cout << "Derived processing: " << value << endl;
    }
};`} />

                            <CodeBlock title="ParamMismatch.cpp" code={`class Logger {
public:
    virtual void log(const string& message) {
        cout << "[LOG] " << message << endl;
    }
};

// ❌ BUG: Different parameter type creates a new overload, not override
class FileLogger : public Logger {
public:
    // void log(string message) override {  // Missing const& !
    //     ❌ COMPILE ERROR with override:
    //     "does not override a virtual function"
    // }

    void log(const string& message) override {  // ✅ Exact match
        ofstream file("log.txt", ios::app);
        file << "[FILE] " << message << endl;

                        </LessonPart>

                        <LessonPart title={<>5. The final Specifier <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">5. محدد final</span></>} icon={Icons.Lock}>
                            <p>
                                Opposite of <code>override</code>: the <code>final</code> keyword prevents further overriding.
                                If you mark a virtual function as <code>final</code>, no child class can override it anymore.
                                You can also mark an entire class as <code>final</code> to prevent inheritance entirely.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    عكس <code>override</code>: الكلمة المحجوزة <code>final</code> تمنع التجاوز الإضافي.
                                    إذا وضعت علامة <code>final</code> على دالة افتراضية، لن تستطيع أي فئة ابن تجاوزها بعد ذلك.
                                    يمكنك أيضاً وضع علامة <code>final</code> على فئة كاملة لمنع الوراثة تماماً.
                                </span>
                            </p>
                            <CodeBlock title="Final.cpp" code={`class Vehicle {
public:
    virtual void startEngine() {
        cout << "Engine started." << endl;
    }
    virtual ~Vehicle() {}
};

class ElectricCar : public Vehicle {
public:
    // This car's startEngine is FINAL — no further changes allowed
    void startEngine() override final {
        cout << "Electric motor activated silently." << endl;
    }
};

class Tesla : public ElectricCar {
public:
    // void startEngine() override {  // ❌ COMPILE ERROR!
    //     "Cannot override 'final' function"
    // }
};

// You can also mark an entire CLASS as final
class Singleton final {
public:
    static Singleton& getInstance() {
        static Singleton instance;
        return instance;
    }
private:
    Singleton() {}
};

// class MySingleton : public Singleton {};  // ❌ COMPILE ERROR!
// Cannot inherit from 'final' class`} />
                        </LessonPart>

                        <LessonPart title={<>6. Advanced: Calling the Parent's Version <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">6. متقدم: استدعاء نسخة الأب</span></>} icon={Icons.TrendingUp}>
                            <p>
                                Sometimes when you override a function, you still want to call the parent's version FIRST,
                                then add your own logic. You can do this with the <code>BaseClass::functionName()</code> syntax.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    أحياناً عندما تتجاوز دالة، لا تزال تريد استدعاء نسخة الأب أولاً،
                                    ثم إضافة منطقك الخاص. يمكنك فعل ذلك بصيغة <code>BaseClass::functionName()</code>.
                                </span>
                            </p>
                            <CodeBlock title="CallingParent.cpp" code={`class Employee {
public:
    virtual void printDetails() {
        cout << "--- Employee Details ---" << endl;
        cout << "Company: TechCorp" << endl;
    }
    virtual ~Employee() {}
};

class Manager : public Employee {
    string department;
public:
    Manager(string dept) : department(dept) {}

    void printDetails() override {
        // First, call the parent's version
        Employee::printDetails();

        // Then add Manager-specific info
        cout << "Role: Manager" << endl;
        cout << "Department: " << department << endl;
    }
};

class Director : public Manager {
    int budget;
public:
    Director(string dept, int b) : Manager(dept), budget(b) {}

    void printDetails() override {
        // Calls Manager::printDetails() which calls Employee::printDetails()
        Manager::printDetails();
        cout << "Budget: $" << budget << endl;
    }
};

int main() {
    Director d("Engineering", 500000);
    d.printDetails();
    // Output:
    // --- Employee Details ---
    // Company: TechCorp
    // Role: Manager
    // Department: Engineering
    // Budget: $500000
}`} />
                        </LessonPart>

                        <LessonPart title={<>7. Advanced: Covariant Return Types <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">7. متقدم: أنواع الإرجاع المتغايرة</span></>} icon={Icons.Microscope}>
                            <p>
                                Normally, an overriding function must have the <em>exact same return type</em> as the base.
                                But C++ allows a special case: if the base returns a <code>Base*</code> or <code>Base&</code>,
                                the derived class can return a <code>Derived*</code> or <code>Derived&</code>. This is called <strong>Covariant Return Type</strong>.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    عادةً، يجب أن يكون لدالة التجاوز <em>نفس نوع الإرجاع بالضبط</em> كالأساس.
                                    لكن C++ تسمح بحالة خاصة: إذا كان الأساس يعيد <code>Base*</code> أو <code>Base&</code>،
                                    يمكن للفئة المشتقة أن تعيد <code>Derived*</code> أو <code>Derived&</code>. يُسمى هذا <strong>نوع الإرجاع المتغاير (Covariant Return Type)</strong>.
                                </span>
                            </p>
                            <CodeBlock title="Covariant.cpp" code={`class Animal {
public:
    virtual Animal* clone() const {
        return new Animal(*this);
    }
    virtual ~Animal() {}
};

class Dog : public Animal {
    string breed;
public:
    Dog(string b) : breed(b) {}

    // Covariant return: Dog* instead of Animal*
    Dog* clone() const override {
        return new Dog(*this); // Returns Dog* (a subtype of Animal*)
    }

    void bark() { cout << breed << " barks!" << endl; }
};

int main() {
    Dog husky("Husky");
    Dog* clonedDog = husky.clone(); // No casting needed!
    clonedDog->bark(); // "Husky barks!"

    // Through base pointer, it still works:
    Animal* animalPtr = &husky;
    Animal* clonedAnimal = animalPtr->clone(); // Returns Dog internally

    delete clonedDog;
    delete clonedAnimal;
}`} />
                        </LessonPart>

                        <LessonPart title={<>8. Advanced: Pure Virtual & Abstract Override Chains <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">8. متقدم: سلاسل التجاوز المجردة</span></>} icon={Icons.Layers}>
                            <p>
                                You can create multi-level inheritance chains where each level overrides differently.
                                A pure virtual function (<code>= 0</code>) FORCES all non-abstract children to provide an implementation.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    يمكنك إنشاء سلاسل وراثة متعددة المستويات حيث يتجاوز كل مستوى بشكل مختلف.
                                    الدالة الافتراضية البحتة (<code>= 0</code>) تُجبر جميع الأبناء غير المجردين على توفير تنفيذ.
                                </span>
                            </p>
                            <CodeBlock title="AbstractChain.cpp" code={`// Level 1: Abstract Interface
class Renderer {
public:
    virtual void render() = 0;        // Pure virtual — MUST override
    virtual void initialize() = 0;
    virtual string getName() = 0;
    virtual ~Renderer() {}
};

// Level 2: Partial Implementation (still abstract)
class GPURenderer : public Renderer {
protected:
    int vram;
public:
    GPURenderer(int v) : vram(v) {}

    void initialize() override {
        cout << "GPU initialized with " << vram << "MB VRAM" << endl;
    }
    // render() and getName() are still pure virtual
};

// Level 3: Concrete Implementation
class OpenGLRenderer : public GPURenderer {
public:
    OpenGLRenderer(int v) : GPURenderer(v) {}

    void render() override {
        cout << "Rendering with OpenGL" << endl;
    }

    string getName() override {
        return "OpenGL Renderer";
    }
};

class VulkanRenderer : public GPURenderer {
public:
    VulkanRenderer(int v) : GPURenderer(v) {}

    void render() override {
        cout << "Rendering with Vulkan (high performance)" << endl;
    }

    string getName() override {
        return "Vulkan Renderer";
    }
};

// Usage with polymorphism
void startEngine(Renderer* r) {
    cout << "Using: " << r->getName() << endl;
    r->initialize();
    r->render();
}

int main() {
    OpenGLRenderer ogl(2048);
    VulkanRenderer vk(4096);

    startEngine(&ogl);
    startEngine(&vk);
}`} />
                        </LessonPart>

                        <LessonPart title={<>9. Interview-Level: Virtual Destructor Explained <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">9. مستوى المقابلات: شرح المهدم الافتراضي</span></>} icon={Icons.Trash}>
                            <p>
                                If you have a base class with virtual functions and you delete a derived object through a base pointer <strong>without a virtual destructor</strong>,
                                the derived class destructor <strong>will NOT be called</strong>. This causes <strong>memory leaks and resource leaks</strong>.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    إذا كان لديك فئة أساسية بدوال افتراضية وحذفت كائناً مشتقاً عبر مؤشر أساسي <strong>بدون مهدم افتراضي</strong>،
                                    فإن مهدم الفئة المشتقة <strong>لن يُستدعى</strong>. هذا يسبب <strong>تسريبات في الذاكرة والموارد</strong>.
                                </span>
                            </p>
                            <CodeBlock title="VirtualDestructor.cpp" code={`class Base {
public:
    Base() { cout << "Base constructed" << endl; }
    // ❌ Non-virtual destructor
    ~Base() { cout << "Base destroyed" << endl; }
};

class Derived : public Base {
    int* data;
public:
    Derived() : data(new int[1000]) {
        cout << "Derived constructed (allocated memory)" << endl;
    }
    ~Derived() {
        delete[] data;
        cout << "Derived destroyed (freed memory)" << endl;
    }
};

int main() {
    Base* ptr = new Derived();
    delete ptr;
    // Output WITHOUT virtual destructor:
    // Base constructed
    // Derived constructed (allocated memory)
    // Base destroyed        ← Derived destructor NEVER called!
    //                       ← Memory LEAKED!
}`} />

                            <CodeBlock title="FixedDestructor.cpp" code={`class Base {
public:
    Base() { cout << "Base constructed" << endl; }
    virtual ~Base() { cout << "Base destroyed" << endl; }  // ✅ virtual!
};

class Derived : public Base {
    int* data;
public:
    Derived() : data(new int[1000]) {
        cout << "Derived constructed" << endl;
    }
    ~Derived() override {  // ✅ override for safety
        delete[] data;
        cout << "Derived destroyed (memory freed)" << endl;
    }
};

int main() {
    Base* ptr = new Derived();
    delete ptr;
    // Output WITH virtual destructor:
    // Base constructed
    // Derived constructed
    // Derived destroyed (memory freed)   ✅
    // Base destroyed                     ✅
}`} />

                            <p className="text-red-400 font-bold mt-2">
                                🔴 RULE: If a class has ANY virtual function, ALWAYS make the destructor virtual.
                                <span className="block text-emerald-400 text-right mt-1" dir="rtl">
                                    🔴 قاعدة: إذا كانت الفئة بها أي دالة افتراضية، اجعل المهدم افتراضياً دائماً.
                                </span>
                            </p>
                        </LessonPart>

    }

    void shutdown() override { cout << "Video stopped" << endl; }

        p->execute();

                                solutionCode={`class Entity {
protected:

public:

class Character : public Entity {

                icon: Icons.EyeOff,

                    <div className="space-y-4">


                        <LessonPart title={<>What is Abstraction? <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">ما هو التجريد؟</span></>} icon={Icons.EyeOff}>
                            <p>
                                Abstraction is about <strong>hiding complexity</strong>. It shows only the "essential" features of an object.
                                Think of it as a "Contract". You define <em>what</em> needs to be done, but not <em>how</em>.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    التجريد يدور حول <strong>إخفاء التعقيد</strong>. إنه يظهر فقط الميزات "الجوهرية" للكائن.
                                    فكر فيه كـ "عقد". أنت تحدد <em>ما</em> يجب فعله، ولكن ليس <em>كيف</em>.
                                </span>
                            </p>
                        </LessonPart>

                        <AnalogySection title={<>The Car Dashboard <span className="block text-sm text-amber-500 mt-1" dir="rtl">مثال: لوحة قيادة السيارة</span></>}>
                            <p>When you drive a car, you use a <strong>Steering Wheel</strong> and <strong>Pedals</strong>.</p>
                            <p className="text-right text-emerald-400" dir="rtl">عندما تقود سيارة، تستخدم <strong>عجلة القيادة</strong> و <strong>الدواسات</strong>.</p>
                            <ul className="list-disc pl-5 space-y-1 text-amber-200/80">
                                <li>The <strong>Steering Wheel</strong> is the Interface (Abstraction). <span className="text-xs text-emerald-400 block text-right" dir="rtl">عجلة القيادة هي الواجهة (التجريد).</span></li>
                                <li>The <strong>Engine/Axle</strong> is the Implementation (Details). <span className="text-xs text-emerald-400 block text-right" dir="rtl">المحرك/المحور هو التنفيذ (التفاصيل).</span></li>
                            </ul>
                            <p className="mt-2">
                                You can drive a generic Ford or a generic Toyota because they implement the <strong>same interface</strong>.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    يمكنك قيادة سيارة فورد عامة أو تويوتا عامة لأنهما تنفذان <strong>نفس الواجهة</strong>.
                                </span>
                            </p>
                        </AnalogySection>

                        <LessonPart title={<>1. The Contract: Pure Virtual Functions <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">1. العقد: الدوال الافتراضية البحتة</span></>} icon={Icons.Layout}>
                            <p>
                                In C++, an <strong>Abstract Class</strong> works like a contract. It forces derived classes to implement specific functions.
                                Use <code>virtual func() = 0</code> to create a "Pure Virtual Function".
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    في C++، تعمل <strong>الفئة المجردة (Abstract Class)</strong> كعقد. تجبر الفئات المشتقة على تنفيذ دوال محددة.
                                    استخدم <code>virtual func() = 0</code> لإنشاء "دالة افتراضية بحتة".
                                </span>
                            </p>
                            <CodeBlock title="Abstraction.cpp" code={`class Shape {
public:
    // Pure Virtual Function
    // = 0 means "I have no body. Children MUST define me."
    virtual void draw() = 0; 
    
    virtual ~Shape() {} 
};

class Circle : public Shape {
public:
    void draw() override { cout << "Drawing Circle"; }
};

class Box : public Shape {
public:
    void draw() override { cout << "Drawing Box"; }
};

// We only care that it is a 'Shape'
void render(Shape* s) {
    s->draw(); 
}`} />
                        </LessonPart>

                        <LessonPart title={<>2. Decoupling: Payment System <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">2. فك الارتباط: نظام الدفع</span></>} icon={Icons.CreditCard}>
                            <p>
                                Abstraction lets you swap systems easily. Imagine an online store that supports multiple payment methods.
                                The store code shouldn't change just because you added a new payment type.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    التجريد يسمح لك بتبديل الأنظمة بسهولة. تخيل متجراً إلكترونياً يدعم طرق دفع متعددة.
                                    يجب ألا يتغير كود المتجر فقط لأنك أضفت نوع دفع جديد.
                                </span>
                            </p>
                            <CodeBlock title="Payment.cpp" code={`// INTERFACE
class IPayment {
public:
    virtual void processAmount(double amt) = 0;
};

// LOW-LEVEL MODULES
class PayPal : public IPayment {
public:
    void processAmount(double amt) override { 
        cout << "PayPal processed $" << amt << endl; 
    }
};

class Stripe : public IPayment {
public:
    void processAmount(double amt) override { 
        cout << "Stripe processed $" << amt << endl; 
    }
};

// HIGH-LEVEL MODULE
class Store {
    IPayment* paymentGateway; // Abstraction!
public:
    Store(IPayment* p) : paymentGateway(p) {}
    
    void checkout(double amount) {
        paymentGateway->processAmount(amount);
    }
};`} />
                        </LessonPart>

                        <LessonPart title={<>3. Strategy Pattern: Social Login <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">3. نمط الاستراتيجية: الدخول الاجتماعي</span></>} icon={Icons.Share2}>
                            <p>
                                Most apps let you login with Google, Facebook, or Email.
                                Abstraction allows us to treat all these strategies as the same <code>LoginStrategy</code>.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    تسمح معظم التطبيقات بالدخول عبر Google أو Facebook أو البريد الإلكتروني.
                                    يسمح لنا التجريد بمعاملة كل هذه الاستراتيجيات على أنها نفس <code>LoginStrategy</code>.
                                </span>
                            </p>
                            <CodeBlock title="AuthStrategy.cpp" code={`class LoginStrategy {
public:
    virtual void login() = 0;
};

class GoogleLogin : public LoginStrategy {
public:
    void login() override { cout << "Redirecting to Google OAuth..."; }
};

class FacebookLogin : public LoginStrategy {
public:
    void login() override { cout << "Redirecting to Facebook..."; }
};

class AuthManager {
    LoginStrategy* strategy;
public:
    void setStrategy(LoginStrategy* s) { strategy = s; }
    void performLogin() { strategy->login(); }
};`} />
                        </LessonPart>

                        <LessonPart title={<>4. Hardware Abstraction (IoT Smart Home) <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">4. تجريد الأجهزة (المنزل الذكي IoT)</span></>} icon={Icons.Cpu}>
                            <p>
                                How does Alexa control 1000 different smart bulbs? It uses a generic <code>SmartDevice</code> abstraction.
                                It doesn't know if it's drawing current to a Philips Hue or a generic LED; it just sends <code>turnOn()</code>.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    كيف تتحكم Alexa في 1000 مصباح ذكي مختلف؟ تستخدم تجريد <code>SmartDevice</code> عام.
                                    هي لا تعرف ما إذا كانت ترسل تياراً إلى Philips Hue أو LED عام؛ هي فقط ترسل <code>turnOn()</code>.
                                </span>
                            </p>
                            <CodeBlock title="SmartHome.cpp" code={`class SmartDevice {
public:
    virtual void turnOn() = 0;
    virtual void turnOff() = 0;
};

class SmartLight : public SmartDevice {
public:
    void turnOn() override { cout << "Light is bright!"; }
    void turnOff() override { cout << "Light is dark."; }
};

class SmartFan : public SmartDevice {
public:
    void turnOn() override { cout << "Fan spinning woooosh!"; }
    void turnOff() override { cout << "Fan stopped."; }
};

void voiceCommand(SmartDevice* device, string cmd) {
    if(cmd == "ON") device->turnOn();
    else device->turnOff();
}`} />
                        </LessonPart>

                content: (
                    <div className="space-y-4">
                        <LessonPart title={<>What is Operator Overloading? <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">ما هو تحميل المعاملات الزائد؟</span></>} icon={Icons.Book}>
                            <p>
                                In C++, operators like <code>+</code>, <code>-</code>, <code>*</code>, and <code>==</code> are just functions with special names.
                                By default, they only work on primitive types (int, float, char).
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    في C++، المعاملات مثل <code>+</code>، <code>-</code>، <code>*</code>، و <code>==</code> هي مجرد دوال بأسماء خاصة.
                                    بشكل افتراضي، هي تعمل فقط على الأنواع الأولية (int, float, char).
                                </span>
                            </p>
                            <p className="mt-2">
                                <strong>Operator Overloading</strong> allows you to define how these symbols behave for your own custom classes.
                                It makes your code look cleaner and more intuitive.
                                Instead of writing <code>v1.add(v2)</code>, you can write <code>v1 + v2</code>.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    <strong>تحميل المعاملات الزائد (Operator Overloading)</strong> يسمح لك بتعريف كيف تتصرف هذه الرموز مع فئاتك المخصصة.
                                    إنه يجعل الكود يبدو أنظف وأكثر بديهية.
                                    بدلاً من كتابة <code>v1.add(v2)</code>، يمكنك كتابة <code>v1 + v2</code>.
                                </span>
                            </p>
                        </LessonPart>

                        <AnalogySection title={<>The Universal Remote <span className="block text-sm text-amber-500 mt-1" dir="rtl">مثال: جهاز التحكم عن بعد العالمي</span></>}>
                            <p>Imagine a TV remote. The "Volume Up" button works on your TV.</p>
                            <p className="text-right text-emerald-400" dir="rtl">تخيل جهاز تحكم في التلفزيون. زر "رفع الصوت" يعمل على تلفزيونك.</p>
                            <p>If you buy a new Sound System, the remote doesn't know how to talk to it. You have to <strong>program</strong> the remote so that when you press "Volume Up", it sends the specific signal the Sound System understands.</p>
                            <p className="text-right text-emerald-400" dir="rtl">إذا اشتريت نظام صوتي جديد، فإن جهاز التحكم لا يعرف كيف يتحدث معه. عليك <strong>برمجة</strong> جهاز التحكم بحيث عندما تضغط "رفع الصوت"، يرسل الإشارة المحددة التي يفهمها النظام الصوتي.</p>
                            <p>You aren't creating a new button; you are giving an existing button a new meaning for a specific device.</p>
                            <p className="text-right text-emerald-400" dir="rtl">أنت لا تنشئ زراً جديداً؛ أنت تعطي زراً موجوداً معنى جديداً لجهاز معين.</p>
                        </AnalogySection>

                        <LessonPart title={<>1. Arithmetic Operators (+, -, *, /) <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">1. المعاملات الحسابية</span></>} icon={Icons.Code}>
                            <p>
                                These are usually implemented as <strong>Member Functions</strong>.
                                The object on the <em>left</em> of the operator calls the function, and the object on the <em>right</em> is passed as an argument.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    هذه عادة ما يتم تنفيذها كـ <strong>دوال أعضاء (Member Functions)</strong>.
                                    الكائن على <em>يسار</em> المعامل يستدعي الدالة، والكائن على <em>يمين</em> المعامل يتم تمريره كحجة.
                                </span>
                            </p>
                            <CodeBlock title="Arithmetic.cpp" code={`class Point {
public:
    int x, y;
    Point(int x, int y) : x(x), y(y) {}

    // Syntax: ReturnType operatorOp(Argument)
    Point operator+(const Point& other) {
        // Create a NEW Point with the result
        return Point(x + other.x, y + other.y);
    }
};

int main() {
    Point p1(10, 20);
    Point p2(5, 5);
    Point p3 = p1 + p2; // p1.operator+(p2)
}`} />
                        </LessonPart>

                        <LessonPart title={<>2. Stream Operators (&lt;&lt;, &gt;&gt;) <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">2. معاملات التدفق</span></>} icon={Icons.Terminal}>
                            <p>
                                This is one of the most useful overloads. It allows you to print objects directly using <code>cout &lt;&lt; obj</code>.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    هذا واحد من أكثر التحميلات فائدة. يسمح لك بطباعة الكائنات مباشرة باستخدام <code>cout &lt;&lt; obj</code>.
                                </span>
                            </p>
                            <div className="bg-slate-900 p-4 rounded border-l-4 border-yellow-500 my-4">
                                <h4 className="text-yellow-400 font-bold text-sm">Why Friend Functions?</h4>
                                <p className="text-xs text-slate-300 mt-1">
                                    When you write <code>cout &lt;&lt; p1</code>, the object on the left is <code>cout</code> (type <code>std::ostream</code>), not your class.
                                    Since you can't modify the source code of <code>std::ostream</code>, you must define this as a <strong>Global Friend Function</strong> so it can access your private data.
                                    <br />
                                    <span className="block text-emerald-400 text-right mt-1" dir="rtl">
                                        عندما تكتب <code>cout &lt;&lt; p1</code>، الكائن على اليسار هو <code>cout</code>، وليس فئتك.
                                        بما أنك لا تستطيع تعديل الكود المصدري لـ <code>std::ostream</code>، يجب عليك تعريف هذا كـ <strong>دالة صديقة عامة (Global Friend Function)</strong> حتى تتمكن من الوصول إلى بياناتك الخاصة.
                                    </span>
                                </p>
                            </div>
                            <CodeBlock title="StreamOverload.cpp" code={`class Point {
private:
    int x, y;
public:
    Point(int x, int y) : x(x), y(y) {}

    // Friend permission granted to this global function
    friend ostream& operator<<(ostream& os, const Point& p);
};

// Implementation (Outside class)
ostream& operator<<(ostream& os, const Point& p) {
    os << "(" << p.x << ", " << p.y << ")";
    return os; // Return stream to allow chaining (cout << a << b)
}

int main() {
    Point p(10, 20);
    cout << "Point is: " << p << endl;
}`} />
                        </LessonPart>

                        <LessonPart title={<>3. Comparison Operators (==, !=, &lt;) <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">3. معاملات المقارنة</span></>} icon={Icons.CheckCircle}>
                            <p>
                                Crucial for logic and sorting. If you want to use <code>std::sort</code> or put objects in a <code>std::set</code>, you often need to overload <code>&lt;</code> or <code>==</code>.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    مهم للمنطق والفرز. إذا أردت استخدام <code>std::sort</code> أو وضع كائنات في <code>std::set</code>، غالباً ما تحتاج إلى تحميل <code>&lt;</code> أو <code>==</code> بشكل زائد.
                                </span>
                            </p>
                            <CodeBlock title="Comparison.cpp" code={`bool operator==(const Point& other) const {
    return (x == other.x) && (y == other.y);
}

bool operator<(const Point& other) const {
    // Sort by x, then by y
    if (x != other.x) return x < other.x;
    return y < other.y;
}`} />
                        </LessonPart>

                        <LessonPart title={<>4. Unary Operators (++, --) <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">4. المعاملات الأحادية</span></>} icon={Icons.RefreshCw}>
                            <p>
                                These work on a single operand. There is a trick to distinguish <strong>Prefix (++i)</strong> from <strong>Postfix (i++)</strong>.
                                C++ uses a dummy <code>int</code> argument to identify the Postfix version.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    تعمل هذه على معامل واحد. هناك حيلة للتمييز بين <strong>البادئة (++i)</strong> و <strong>اللاحقة (i++)</strong>.
                                    تستخدم C++ حجة <code>int</code> وهمية لتمييز نسخة اللاحقة.
                                </span>
                            </p>
                            <CodeBlock title="Increment.cpp" code={`// Prefix (++p)
Point& operator++() {
    x++; y++;
    return *this; // Return ref to changed object
}

// Postfix (p++) - Note the (int) dummy arg
Point operator++(int) {
    Point temp = *this; // Save old state
    x++; y++;
    return temp; // Return OLD state
}`} />
                        </LessonPart>

                        <LessonPart title={<>5. Subscript Operator [] <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">5. معامل الفهرسة []</span></>} icon={Icons.List}>
                            <p>
                                Allows your object to behave like an array. Very useful for custom container classes.
                                You usually need two versions: one for reading (const) and one for writing.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    يسمح لكائنك بالتصرف مثل المصفوفة. مفيد جداً لفئات الحاويات المخصصة.
                                    عادة ما تحتاج إلى نسختين: واحدة للقراءة (const) وواحدة للكتابة.
                                </span>
                            </p>
                            <CodeBlock title="Subscript.cpp" code={`class IntArray {
    int arr[10];
public:
    // For writing: arr[0] = 5;
    int& operator {
        if(index < 0 || index >= 10) throw "Out of bounds";
        return arr[index];
    }

    // For reading: cout << arr[0];
    const int& operator const {
        return arr[index];
    }
};`} />
                        </LessonPart>

                        <LessonPart title={<>6. Function Call Operator () <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">6. معامل استدعاء الدالة ()</span></>} icon={Icons.Play}>
                            <p>
                                Allows an object to be "called" like a function. Objects that do this are called <strong>Functors</strong>.
                                They are powerful because they can maintain state (memory) between calls, unlike regular functions.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    يسمح باستدعاء الكائن مثل الدالة. تسمى الكائنات التي تفعل ذلك <strong>Functors</strong>.
                                    إنها قوية لأنها يمكن أن تحافظ على الحالة (الذاكرة) بين الاستدعاءات، على عكس الدوال العادية.
                                </span>
                            </p>
                            <CodeBlock title="Functor.cpp" code={`class Multiplier {
    int factor;
public:
    Multiplier(int f) : factor(f) {}

    // The magic operator
    int operator()(int num) {
        return num * factor;
    }
};

int main() {
    Multiplier triple(3); // Create object with state
    cout << triple(10);   // Call it! Output: 30
    cout << triple(5);    // Output: 15
}`} />
                        </LessonPart>

                        <MistakeAlert mistakes={[
                            { title: "Changing Precedence", desc: "You cannot change the order of operations. Multiplication (*) will always happen before Addition (+), even for your custom types. | تغيير الأسبقية: لا يمكنك تغيير ترتيب العمليات. الضرب (*) سيحدث دائماً قبل الجمع (+)، حتى لفئاتك المخصصة." },

                        ]} />


                        <div className="my-8 space-y-4">
                            <h3 className="text-xl font-bold text-white flex items-center gap-2">

                                    description="Build a Clock class that tracks hours, minutes, and seconds. Implement a tick() method that handles time rollover (e.g., 59s -> 1m). | ابنِ فئة Clock تتبع الساعات والدقائق والثواني. نفذ طريقة tick() للتعامل مع تجاوز الوقت (مثلاً، 59ث -> 1د)."
                                    solutionCode={`#include <iostream>
#include <iomanip> // For setfill and setw
using namespace std;

class Clock {
private:
    int h, m, s;
public:
    Clock(int hours, int minutes, int seconds) : h(hours), m(minutes), s(seconds) {}

    void tick() {
        s++;
        if (s >= 60) {
            s = 0;
            m++;
            if (m >= 60) {
                m = 0;
                h++;
                if (h >= 24) h = 0;
            }
        }
    }

    void display() {
        // Prints time in 00:00:00 format
        cout << setfill('0') << setw(2) << h << ":" 
             << setw(2) << m << ":" 
             << setw(2) << s << endl;
    }
};

int main() {
    Clock c(23, 59, 58);
    c.display();
    c.tick(); // 23:59:59
    c.display();
    c.tick(); // 00:00:00
    c.display();
    return 0;
}`}

                                <ProjectCard
                                    num={23}
                                    title="Observer Pattern / نمط المراقب (Observer)"
                                    difficulty="Advanced"
                                    topics={["Design Patterns", "Polymorphism", "Events"]}
                                    description="Create a 'NewsAgency' (Subject) and 'NewsChannel' (Observer). When the agency gets news, all channels should automatically display it. | أنشئ 'NewsAgency' (الموضوع) و 'NewsChannel' (المراقب). عندما تحصل الوكالة على أخبار، يجب أن تعرضها جميع القنوات تلقائياً."
                                    solutionCode={`#include <iostream>
#include <vector>
#include <string>
using namespace std;

// Observer Interface
class Observer {
public:
    virtual void update(string news) = 0;
};

// Subject
class NewsAgency {
private:
    vector<Observer*> observers;
public:
    void attach(Observer* o) {
        observers.push_back(o);
    }

    void setNews(string news) {
        cout << "News Alert: " << news << endl;
        notify(news);
    }

    void notify(string news) {
        for (Observer* o : observers) {
            o->update(news);
        }
    }
};

// Concrete Observer
class Channel : public Observer {
    string name;
public:
    Channel(string n) : name(n) {}
    void update(string news) override {
        cout << name << " broadcasting: " << news << endl;
    }
};

int main() {
    NewsAgency agency;
    Channel c1("BBC");
    Channel c2("CNN");

    agency.attach(&c1);
    agency.attach(&c2);

    agency.setNews("C++ is awesome!");
    // Both channels will print the news automatically
    return 0;
}`}

                                    solutionCode={`template <typename T>
class SmartPtr {
    T* ptr;
public:
    explicit SmartPtr(T* p = nullptr) : ptr(p) {}
    ~SmartPtr() { delete ptr; cout << "Auto-deleted!"; }
    
    // Prevent Copying (Unique Ownership)
    SmartPtr(const SmartPtr&) = delete;
    SmartPtr& operator=(const SmartPtr&) = delete;

    T& operator*() { return *ptr; }
    T* operator->() { return ptr; }
};`}
