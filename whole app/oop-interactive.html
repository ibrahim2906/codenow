<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastery C++ OOP Guide</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏗️</text></svg>">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Prism.js for Syntax Highlighting -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>

    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        pre {
            font-family: 'Fira Code', monospace;
        }

        /* Custom Animations */
        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-5px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .animate-float {
            animation: float 4s ease-in-out infinite;
        }


        @keyframes wiggle {

            0%,
            100% {
                transform: rotate(-3deg);
            }

            50% {
                transform: rotate(3deg);
            }
        }

        @keyframes spin-slow {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }

            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        /* Missing Animation Classes */
        .animate-in {
            animation-duration: 0.5s;
            animation-fill-mode: both;
        }

        .animate-in.duration-300 {
            animation-duration: 300ms;
        }

        .animate-in.duration-500 {
            animation-duration: 500ms;
        }

        .animate-in.duration-700 {
            animation-duration: 700ms;
        }

        .fade-in {
            animation-name: fadeIn;
        }

        .slide-in-from-left-4 {
            animation-name: slideInLeft;
        }

        .slide-in-from-top-2 {
            animation-name: slideInTop;
        }

        .slide-in-from-bottom-4 {
            animation-name: slideInBottom;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideInLeft {
            from {
                transform: translateX(-1rem);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideInTop {
            from {
                transform: translateY(-0.5rem);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes slideInBottom {
            from {
                transform: translateY(1rem);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <a href="../index.html"
        style="position: fixed; top: 20px; right: 20px; z-index: 9999; background: rgba(59, 130, 246, 0.9); color: white; padding: 10px 20px; border-radius: 50px; text-decoration: none; font-weight: 600; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.2); transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
        <span>←</span> Back to Code Now
    </a>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Icon Components (Replacing Lucide for Single File Compatibility) ---
        const Icon = ({ path, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {path}
            </svg>
        );

        const Icons = {
            Book: (props) => <Icon {...props} className={`${props.className} group-hover:scale-110 transition-transform duration-300`} path={<><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" /><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" /></>} />,
            Code: (props) => <Icon {...props} className={`${props.className} group-hover:text-green-400 transition-colors duration-300`} path={<><polyline points="16 18 22 12 16 6" /><polyline points="8 6 2 12 8 18" /></>} />,
            Terminal: (props) => <Icon {...props} className={`${props.className} group-hover:translate-x-1 transition-transform duration-300`} path={<><polyline points="4 17 10 11" /><line x1="12" y1="19" x2="20" y2="19" /></>} />,
            ChevronRight: (props) => <Icon {...props} path={<polyline points="9 18 15 12 9 6" />} />,
            CheckCircle: (props) => <Icon {...props} className={`${props.className} text-green-500`} path={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></>} />,
            Layers: (props) => <Icon {...props} path={<><polygon points="12 2 2 7 12 12 22 7 12 2" /><polyline points="2 17 12 22 22 17" /><polyline points="2 12 12 17 22 12" /></>} />,
            Box: (props) => <Icon {...props} path={<><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" /><polyline points="3.27 6.96 12 12.01 20.73 6.96" /><line x1="12" y1="22.08" x2="12" y2="12" /></>} />,
            Cpu: (props) => <Icon {...props} className={`${props.className} hover:animate-pulse`} path={<><rect x="4" y="4" width="16" height="16" rx="2" ry="2" /><rect x="9" y="9" width="6" height="6" /><line x1="9" y1="1" x2="9" y2="4" /><line x1="15" y1="1" x2="15" y2="4" /><line x1="9" y1="20" x2="9" y2="23" /><line x1="15" y1="20" x2="15" y2="23" /><line x1="20" y1="9" x2="23" y2="9" /><line x1="20" y1="14" x2="23" y2="14" /><line x1="1" y1="9" x2="4" y2="9" /><line x1="1" y1="14" x2="4" y2="14" /></>} />,
            Shield: (props) => <Icon {...props} className={`${props.className} hover:text-emerald-400 transition-colors`} path={<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />} />,
            Share2: (props) => <Icon {...props} className={`${props.className} hover:rotate-45 transition-transform`} path={<><circle cx="18" cy="5" r="3" /><circle cx="6" cy="12" r="3" /><circle cx="18" cy="19" r="3" /><line x1="8.59" y1="13.51" x2="15.42" y2="17.49" /><line x1="15.41" y1="6.51" x2="8.59" y2="10.49" /></>} />,
            Layout: (props) => <Icon {...props} path={<rect x="3" y="3" width="18" height="18" rx="2" ry="2" />} />,
            Microscope: (props) => <Icon {...props} path={<><path d="M6 18h8" /><path d="M3 22h18" /><path d="M14 22a7 7 0 1 0 0-14h-1" /><path d="M9 14h2" /><path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z" /><path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3" /></>} />,
            Play: (props) => <Icon {...props} path={<polygon points="5 3 19 12 5 21 5 3" />} />,
            RefreshCw: (props) => <Icon {...props} className={`${props.className} group-hover:animate-[spin_3s_linear_infinite]`} path={<><path d="M23 4v6h-6" /><path d="M1 20v-6h6" /><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" /></>} />,
            GitBranch: (props) => <Icon {...props} path={<><line x1="6" y1="3" x2="6" y2="15" /><circle cx="18" cy="6" r="3" /><circle cx="6" cy="18" r="3" /><path d="M18 9a9 9 0 0 1-9 9" /></>} />,
            Lightbulb: (props) => <Icon {...props} className={`${props.className} hover:text-yellow-300 transition-colors`} path={<><line x1="9" y1="18" x2="15" y2="18" /><line x1="10" y1="22" x2="14" y2="22" /><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 9.5 6 4.65 4.65 0 0 0 8 10.5c0 1.55.94 2.89 2.37 3.63" /></>} />,
            Settings: (props) => <Icon {...props} className={`${props.className} group-hover:animate-[spin_4s_linear_infinite]`} path={<circle cx="12" cy="12" r="3" />} />,
            Target: (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></>} />,
            Lock: (props) => <Icon {...props} path={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></>} />,
            Unlock: (props) => <Icon {...props} path={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 9.9-1" /></>} />,
            Database: (props) => <Icon {...props} path={<><ellipse cx="12" cy="5" rx="9" ry="3" /><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" /><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" /></>} />,
            PenTool: (props) => <Icon {...props} path={<path d="M12 19l7-7 3 3-7 7-3-3z" />} />,
            Zap: (props) => <Icon {...props} className={`${props.className} text-yellow-400 animate-pulse`} path={<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />} />,
            AlertTriangle: (props) => <Icon {...props} className={`${props.className} animate-[wiggle_1s_ease-in-out_infinite]`} path={<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />} />,
            Star: (props) => <Icon {...props} className={`${props.className} hover:text-yellow-400 transition-colors`} path={<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />} />,
            TrendingUp: (props) => <Icon {...props} className={`${props.className} group-hover:-translate-y-1 transition-transform`} path={<polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />} />,
            Award: (props) => <Icon {...props} className={`${props.className} hover:scale-110 transition-transform`} path={<><circle cx="12" cy="8" r="7" /><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88" /></>} />,
            Eye: (props) => <Icon {...props} path={<><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" /><circle cx="12" cy="12" r="3" /></>} />,
            EyeOff: (props) => <Icon {...props} path={<><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" /><line x1="1" y1="1" x2="23" y2="23" /></>} />,
            Copy: (props) => <Icon {...props} path={<><rect x="9" y="9" width="13" height="13" rx="2" ry="2" /><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" /></>} />,
            Trash: (props) => <Icon {...props} path={<><polyline points="3 6 5 6 21 6" /><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" /></>} />,
            CreditCard: (props) => <Icon {...props} path={<><rect x="1" y="4" width="22" height="16" rx="2" ry="2" /><line x1="1" y1="10" x2="23" y2="10" /></>} />,
            Menu: (props) => <Icon {...props} path={<><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="18" x2="21" y2="18" /></>} />,
            X: (props) => <Icon {...props} path={<><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></>} />,
        };

        // --- Common Components ---

        const LessonPart = ({ title, icon: IconComp, children }) => (
            <div className="mb-12 border-l-4 border-slate-700 pl-6 py-6 hover:border-blue-500 transition-all duration-500 hover:bg-slate-800/20 rounded-r-xl group">
                <div className="flex items-center space-x-3 mb-4">
                    <div className="p-2 bg-slate-800 rounded-lg">
                        <IconComp className="w-5 h-5 text-blue-400" />
                    </div>
                    <h2 className="text-2xl font-bold text-slate-100">{title}</h2>
                </div>
                <div className="text-slate-300 leading-relaxed space-y-4 text-lg">
                    {children}
                </div>
            </div>
        );

        const AnalogySection = ({ title, children }) => (
            <div className="my-8 bg-gradient-to-r from-amber-900/20 to-transparent p-6 rounded-xl border border-amber-600/30 hover:shadow-lg hover:shadow-amber-900/20 transition-all duration-300 transform hover:-translate-y-1">
                <div className="flex items-center space-x-3 mb-3 text-amber-400">
                    <Icons.Lightbulb className="w-6 h-6" />
                    <h3 className="font-bold text-lg uppercase tracking-wider">Real-Life Analogy: {title}</h3>
                </div>
                <div className="text-amber-100/90 italic border-l-2 border-amber-500/50 pl-4 py-1 text-lg">
                    {children}
                </div>
            </div>
        );

        const VocabCard = ({ term, definition }) => (
            <div className="my-4 bg-slate-800 p-4 rounded-lg border-l-4 border-purple-500 shadow-md hover:scale-[1.02] transition-transform duration-300">
                <span className="font-bold text-purple-300 text-lg block mb-1">{term}</span>
                <span className="text-slate-300">{definition}</span>
            </div>
        );

        const CodeBlock = ({ code, title, language = 'cpp' }) => {
            const codeRef = React.useRef(null);

            React.useEffect(() => {
                if (window.Prism && codeRef.current) {
                    window.Prism.highlightElement(codeRef.current);
                }
            }, [code]);

            return (
                <div className="my-6 rounded-lg overflow-hidden border border-slate-700 bg-[#1d1f21] shadow-lg group hover:shadow-blue-900/20 transition-shadow duration-300">
                    <div className="flex items-center justify-between px-4 py-2 bg-[#2d2d2d] border-b border-slate-700">
                        <span className="text-xs font-mono text-slate-300 flex items-center gap-2">
                            <Icons.Terminal className="w-3 h-3" />
                            {title || 'Code.cpp'}
                        </span>
                        <div className="flex space-x-1.5">
                            <div className="w-2.5 h-2.5 rounded-full bg-red-500/50 group-hover:bg-red-500 transition-colors"></div>
                            <div className="w-2.5 h-2.5 rounded-full bg-yellow-500/50 group-hover:bg-yellow-500 transition-colors"></div>
                            <div className="w-2.5 h-2.5 rounded-full bg-green-500/50 group-hover:bg-green-500 transition-colors"></div>
                        </div>
                    </div>
                    <pre className="p-4 overflow-x-auto text-sm font-mono leading-relaxed !bg-[#1d1f21] !m-0 !p-4">
                        <code ref={codeRef} className={`language-${language}`}>{code}</code>
                    </pre>
                </div>
            );
        };

        const MistakeAlert = ({ mistakes }) => (
            <div className="my-8 bg-red-950/30 border border-red-900 rounded-xl overflow-hidden">
                <div className="bg-red-900/20 px-6 py-3 border-b border-red-900 flex items-center text-red-400 font-bold">
                    <Icons.AlertTriangle className="w-5 h-5 mr-2" />
                    Common Beginner Mistakes
                </div>
                <div className="p-6 space-y-4">
                    {mistakes.map((mistake, idx) => (
                        <div key={idx} className="flex items-start gap-3">
                            <div className="text-red-500 font-bold text-lg">❌</div>
                            <div>
                                <h4 className="text-red-300 font-bold text-sm">{mistake.title}</h4>
                                <p className="text-red-200/70 text-sm">{mistake.desc}</p>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const MemoryZone = ({ stackItems, heapItems, notes }) => (
            <div className="my-8 bg-[#0f1115] p-6 rounded-xl border border-slate-700 shadow-inner">
                <div className="flex items-center space-x-2 mb-6 text-slate-400">
                    <Icons.Cpu className="w-5 h-5" />
                    <span className="uppercase text-xs font-bold tracking-widest">System Memory Visualization</span>
                </div>
                <div className="grid md:grid-cols-2 gap-8">
                    {/* Stack */}
                    <div className="relative">
                        <div className="absolute -top-3 left-4 bg-green-900 text-green-300 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider border border-green-700">The Stack (Fast/Auto)</div>
                        <div className="border-2 border-dashed border-green-800/50 rounded-lg p-6 bg-green-900/5 space-y-2 min-h-[150px]">
                            {stackItems.map((item, idx) => (
                                <div key={idx} className="bg-green-900/40 border border-green-700/50 p-2 rounded text-xs font-mono text-green-100 flex justify-between animate-in fade-in slide-in-from-left-4 duration-500" style={{ animationDelay: `${idx * 100}ms` }}>
                                    <span>{item.name}</span>
                                    <span className="text-green-400">{item.value}</span>
                                </div>
                            ))}
                            {stackItems.length === 0 && <div className="text-green-800/50 text-center italic text-xs mt-10">Empty Stack Frame</div>}
                        </div>
                    </div>
                    {/* Heap */}
                    <div className="relative">
                        <div className="absolute -top-3 left-4 bg-blue-900 text-blue-300 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wider border border-blue-700">The Heap (Slow/Manual)</div>
                        <div className="border-2 border-dashed border-blue-800/50 rounded-lg p-6 bg-blue-900/5 space-y-2 min-h-[150px]">
                            {heapItems.map((item, idx) => (
                                <div key={idx} className="bg-blue-900/40 border border-blue-700/50 p-2 rounded text-xs font-mono text-blue-100 flex justify-between">
                                    <span>{item.address}</span>
                                    <span className="text-blue-400">{item.data}</span>
                                </div>
                            ))}
                            {heapItems.length === 0 && <div className="text-blue-800/50 text-center italic text-xs mt-10">Empty Heap Space</div>}
                        </div>
                    </div>
                </div>
                {notes && <p className="mt-4 text-xs text-slate-500 italic border-t border-slate-800 pt-2">{notes}</p>}
            </div>
        );

        const SectionHeader = ({ icon: Icon, title, subtitle }) => (
            <div className="mb-12 border-b border-slate-800 pb-8">
                <div className="inline-flex items-center space-x-2 text-blue-400 mb-4 bg-blue-900/10 px-3 py-1 rounded-full border border-blue-900/30">
                    <Icon className="w-4 h-4" />
                    <span className="uppercase tracking-widest text-[10px] font-bold">Module</span>
                </div>
                <h1 className="text-5xl font-extrabold text-white mb-4 tracking-tight leading-tight">{title}</h1>
                <p className="text-xl text-slate-400 font-light max-w-2xl">{subtitle}</p>
            </div>
        );

        const LineByLineAnalysis = ({ items }) => (
            <div className="my-6 space-y-1">
                {items.map((item, idx) => (
                    <div key={idx} className="flex group">
                        <div className="w-12 shrink-0 bg-slate-800 text-slate-500 font-mono text-xs flex items-center justify-center border-r border-slate-700 group-hover:bg-blue-900/20 group-hover:text-blue-400 transition-colors">
                            Line {item.line}
                        </div>
                        <div className="flex-1 bg-slate-900/50 p-3 text-sm border-b border-slate-800 text-slate-300 group-hover:bg-slate-800 transition-colors">
                            <span className="font-mono text-blue-300 bg-blue-900/20 px-1 rounded mr-2">{item.code}</span>
                            {item.explanation}
                        </div>
                    </div>
                ))}
            </div>
        );

        const Quiz = ({ questions }) => {
            const [answers, setAnswers] = useState({});
            const [showResults, setShowResults] = useState(false);

            const handleSelect = (qIndex, optionIndex) => {
                setAnswers({ ...answers, [qIndex]: optionIndex });
                setShowResults(false);
            };

            return (
                <div className="mt-8 bg-slate-800/50 border border-slate-700 rounded-xl p-6">
                    <h3 className="text-xl font-bold text-white mb-6 flex items-center">
                        <Icons.CheckCircle className="w-5 h-5 mr-2 text-green-400" />
                        Quick Knowledge Check
                    </h3>
                    <div className="space-y-8">
                        {questions.map((q, idx) => (
                            <div key={idx} className="space-y-3">
                                <p className="font-medium text-slate-200 text-lg">{idx + 1}. {q.question}</p>
                                <div className="grid gap-2">
                                    {q.options.map((opt, optIdx) => (
                                        <button
                                            key={optIdx}
                                            onClick={() => handleSelect(idx, optIdx)}
                                            disabled={showResults}
                                            className={`text-left px-5 py-3 rounded-lg transition-all border ${answers[idx] === optIdx
                                                ? 'bg-blue-600 border-blue-500 text-white shadow-lg shadow-blue-900/50'
                                                : 'bg-slate-800 border-slate-700 text-slate-400 hover:bg-slate-700 hover:border-slate-600'
                                                } ${showResults && answers[idx] === optIdx
                                                    ? optIdx === q.correct
                                                        ? '!bg-green-600 !border-green-500'
                                                        : '!bg-red-600 !border-red-500'
                                                    : ''

                            <p>
                                Before we dive into Object-Oriented Programming (OOP), we need to fundamentally shift how we perceive coding.

                                In the context of OOP, understanding this is crucial because C++ is a statically-typed language. The compiler needs to know the exact "size" and "layout" of your objects in memory <em>before</em> the program even runs.

                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">

                            <p>
                                We know what an object is (a specific thing, like "Player 1"). But how do we tell C++ what a Player looks like?
                                We need a <strong>Class</strong>. A Class is a <strong>User-Defined Data Type</strong>.
                                It doesn't occupy memory itself; it describes how memory <em>should</em> be laid out when an object is created.

                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">

                        <LessonPart title={<>Memory Layout & The 'this' Pointer <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">تخطيط الذاكرة ومؤشر 'this'</span></>} icon={Icons.Cpu}>

                                <strong>Myth:</strong> Functions are stored inside every object.<br />
                                <strong>Fact:</strong> Functions are stored only ONCE in the "Code Segment" of memory. Each object only holds its own variables. When you call a function, C++ secretly passes a hidden pointer called <code>this</code> so the function knows which object's data to use.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    <strong>خرافة:</strong> الدوال مخزنة داخل كل كائن.<br />

                                How does the shared function know WHICH object called it?

                                <br />

                                    كيف تعرف الدالة المشتركة أي كائن استدعاها؟<br />

        this->name = name;

    void introduce() {

};`} />

            {
                id: 'encapsulation',
                title: '4. Encapsulation (Deep Dive)',
                icon: Icons.Lock,
                content: (
                    <div className="space-y-4">
                        <LessonPart title={<>The First Pillar of OOP <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">الركن الأول في OOP</span></>} icon={Icons.Shield}>
                            <p>
                                Encapsulation is more than just "Data Hiding". It is the practice of bundling data (variables) and methods (functions) into a single unit (Class) and <strong>restricting access</strong> to the internal details to ensure safety and flexibility.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    التغليف هو أكثر من مجرد "إخفاء البيانات". إنه ممارسة تجميع البيانات (المتغيرات) والدوال (الطرق) في وحدة واحدة (فئة) و <strong>تقييد الوصول</strong> إلى التفاصيل الداخلية لضمان الأمان والمرونة.
                                </span>
                            </p>
                            <p className="mt-2">
                                Think of it as a protective shield. It prevents external code from putting your object into an invalid state (like setting age to -50). It also allows you to change the internal code later without breaking the programs that use your class.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    فكر فيه كدرع واقٍ. يمنع الكود الخارجي من وضع كائنك في حالة غير صالحة (مثل تعيين العمر إلى -50). كما يسمح لك بتغيير الكود الداخلي لاحقاً دون كسر البرامج التي تستخدم فئتك.
                                </span>
                            </p>
                        </LessonPart>

                        <LessonPart title={<>Access Modifiers: The Security Guards <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">معدلات الوصول: حراس الأمن</span></>} icon={Icons.Lock}>
                            <p>C++ provides three levels of privacy. Think of your class as a high-security building:</p>
                            <p className="text-right text-emerald-400 mb-2" dir="rtl">توفر C++ ثلاثة مستويات من الخصوصية. فكر في فئتك كمبنى عالي الأمان:</p>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
                                <div className="bg-red-900/20 border border-red-800 p-4 rounded">
                                    <h4 className="text-red-400 font-bold">Private <span className="float-right text-sm" dir="rtl">خاص</span></h4>
                                    <p className="text-xs text-slate-300 mt-1">Only code <strong>inside</strong> this class can touch this. (The Vault)</p>
                                    <p className="text-xs text-emerald-400 text-right mt-1" dir="rtl">فقط الكود <strong>داخل</strong> هذه الفئة يمكنه لمس هذا. (الخزنة)</p>
                                </div>
                                <div className="bg-yellow-900/20 border border-yellow-800 p-4 rounded">
                                    <h4 className="text-yellow-400 font-bold">Protected <span className="float-right text-sm" dir="rtl">محمي</span></h4>
                                    <p className="text-xs text-slate-300 mt-1">This class and its <strong>children</strong> (derived classes) can touch this.</p>
                                    <p className="text-xs text-emerald-400 text-right mt-1" dir="rtl">هذه الفئة و <strong>أبناؤها</strong> (الفئات المشتقة) يمكنهم لمس هذا.</p>
                                </div>
                                <div className="bg-green-900/20 border border-green-800 p-4 rounded">
                                    <h4 className="text-green-400 font-bold">Public <span className="float-right text-sm" dir="rtl">عام</span></h4>
                                    <p className="text-xs text-slate-300 mt-1"><strong>Everyone</strong> can access this. (The Lobby)</p>
                                    <p className="text-xs text-emerald-400 text-right mt-1" dir="rtl"><strong>الجميع</strong> يمكنهم الوصول إلى هذا. (الردهة)</p>
                                </div>
                            </div>
                        </LessonPart>

                        <AnalogySection title={<>The Smartphone Screen <span className="block text-sm text-amber-500 mt-1" dir="rtl">مثال: شاشة الهاتف الذكي</span></>}>
                            <p>Your phone has complex electronics inside (CPU, Battery, Circuits). These are <strong>Private</strong>. You cannot touch them directly, which is good because you might break them.</p>
                            <p className="text-right text-emerald-400 mb-2" dir="rtl">يحتوي هاتفك على إلكترونيات معقدة في الداخل (المعالج، البطارية، الدوائر). هذه <strong>خاصة (Private)</strong>. لا يمكنك لمسها مباشرة، وهذا جيد لأنك قد تكسرها.</p>

                            <p>The Screen and Buttons are <strong>Public</strong>. You use them to interact with the phone. The phone ensures that pressing "Volume Up" doesn't explode the battery. This is the <strong>Public Interface</strong>.</p>
                            <p className="text-right text-emerald-400" dir="rtl">الشاشة والأزرار <strong>عامة (Public)</strong>. تستخدمها للتفاعل مع الهاتف. يضمن الهاتف أن الضغط على "رفع الصوت" لا يفجر البطارية. هذه هي <strong>الواجهة العامة</strong>.</p>
                        </AnalogySection>

                        <LessonPart title={<>The Problem: Direct Access (No Encapsulation) <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">المشكلة: الوصول المباشر (بدون تغليف)</span></>} icon={Icons.AlertTriangle}>
                            <p>
                                Without encapsulation, anyone can change your data to garbage values. This breaks the "Invariant" (the rules) of your object.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    بدون التغليف، يمكن لأي شخص تغيير بياناتك إلى قيم غير صالحة. هذا يكسر "الثابت" (القواعد) لكائنك.
                                </span>
                            </p>
                            <CodeBlock title="BadBankAccount.cpp" code={`struct BankAccount {
    double balance; // Public by default in struct
};

int main() {
    BankAccount acc;
    acc.balance = 1000;
    
    // DANGER: Direct access allows invalid state!
    acc.balance = -500000; // Now the bank is broken.
    
    cout << acc.balance; 
}`} />
                        </LessonPart>

                        <LessonPart title={<>The Solution: Getters and Setters <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">الحل: دوال الجلب والتعيين</span></>} icon={Icons.CheckCircle}>
                            <p>
                                We make data <code>private</code> and provide <code>public</code> functions to control access.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    نجعل البيانات <code>private</code> ونوفر دوال <code>public</code> للتحكم في الوصول.
                                </span>
                            </p>
                            <ul className="list-disc pl-5 space-y-2 text-slate-300">
                                <li>
                                    <strong>Validation:</strong> Prevent invalid data (e.g., <code>age = -5</code>).
                                    <span className="block text-emerald-400 text-right" dir="rtl"><strong>التحقق:</strong> منع البيانات غير الصالحة (مثال: العمر = -5).</span>
                                </li>
                                <li>
                                    <strong>Read-Only Access:</strong> Allow users to see a value but not change it (e.g., <code>getScore()</code> but no <code>setScore()</code>).
                                    <span className="block text-emerald-400 text-right" dir="rtl"><strong>وصول للقراءة فقط:</strong> السماح للمستخدمين برؤية القيمة ولكن عدم تغييرها.</span>
                                </li>
                                <li>
                                    <strong>Decoupling:</strong> You can change the internal variable name or type later without breaking external code.
                                    <span className="block text-emerald-400 text-right" dir="rtl"><strong>فك الارتباط:</strong> يمكنك تغيير اسم المتغير الداخلي أو نوعه لاحقاً دون كسر الكود الخارجي.</span>
                                </li>
                            </ul>
                            <CodeBlock title="SecureBankAccount.cpp" code={`class BankAccount {
private:
    double balance; // Hidden from the world

public:
    BankAccount(double initial) {
        if(initial >= 0) balance = initial;
        else balance = 0;
    }

    // Getter (Read-Only access)
    double getBalance() {
        return balance;
    }

    // Setter (Controlled Write access)
    void deposit(double amount) {
        if(amount > 0) {
            balance += amount;
            cout << "Deposited: " << amount << endl;
        } else {
            cout << "Invalid amount!" << endl;
        }
    }
};

int main() {
    BankAccount acc(1000);
    // acc.balance = -500; // ERROR: Private member
    
    acc.deposit(500); // OK: Goes through validation
    acc.deposit(-99); // OK: Rejected by validation logic
}`} />
                        </LessonPart>

                        <LessonPart title={<>Advanced: Computed Properties <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">متقدم: الخصائص المحسوبة</span></>} icon={Icons.Zap}>
                            <p>
                                Encapsulation allows you to return data that doesn't actually exist as a variable!
                                For example, a Rectangle might store <code>width</code> and <code>height</code>, but you can ask for <code>getArea()</code>.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    يسمح لك التغليف بإرجاع بيانات لا توجد فعلياً كمتغير!
                                    على سبيل المثال، قد يخزن المستطيل <code>width</code> و <code>height</code>، ولكن يمكنك طلب <code>getArea()</code>.
                                </span>
                            </p>
                            <CodeBlock title="Rectangle.cpp" code={`class Rectangle {
private:
    int width, height;

public:
    Rectangle(int w, int h) : width(w), height(h) {}

    // There is no "area" variable inside the class.
    // It is calculated on-the-fly.
    int getArea() {
        return width * height;
    }
};`} />
                        </LessonPart>

                        <LessonPart title={<>Const Correctness <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">صحة الثوابت (Const)</span></>} icon={Icons.Lock}>
                            <p>
                                When a method doesn't change the object's state (like <code>getBalance()</code>), you should mark it as <code>const</code>.
                                This allows the method to be called on <code>const</code> objects and prevents accidental modification.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    عندما لا تغير الدالة حالة الكائن (مثل <code>getBalance()</code>)، يجب عليك وضع علامة <code>const</code> عليها.
                                    هذا يسمح باستدعاء الدالة على الكائنات الثابتة (const objects) ويمنع التعديل العرضي.
                                </span>
                            </p>
                            <CodeBlock title="ConstMethods.cpp" code={`class Hero {
    int hp;
public:
    // "const" after function name means: "I promise not to change variables"
    int getHP() const { 
        // hp = 100; // ERROR! You promised not to touch.
        return hp; 
    }

    void takeDamage(int dmg) { // Not const, changes state
        hp -= dmg;
    }
};

void showStats(const Hero& h) {
    // We can ONLY call const methods on 'h' here
    cout << h.getHP(); 
    // h.takeDamage(10); // ERROR! 'h' is const.
}`} />
                        </LessonPart>

                        <MistakeAlert mistakes={[

                            { title: "Getters for Everything", desc: "Don't blindly create get/set for every variable. If a variable shouldn't change, don't make a setter! | لا تنشئ بشكل أعمى get/set لكل متغير. إذا كان المتغير لا ينبغي أن يتغير، لا تنشئ له setter!" }

                        <div className="my-8 space-y-4">

            {
                id: 'constructors',
                title: '5. Constructors & Destructors',
                icon: Icons.Zap,
                content: (


                    <div className="space-y-4">
                        <LessonPart title={<>The Object Lifecycle: Birth & Death <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">دورة حياة الكائن: الولادة والموت</span></>} icon={Icons.RefreshCw} >
                            <p>
                                Just like humans, objects have a lifecycle.
                                <br />1. <strong>Birth (Constructor)</strong>: Setup data and resources.
                                <br />2. <strong>Life</strong>: Do work / call methods.
                                <br />3. <strong>Death (Destructor)</strong>: Clean up memory and close files.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    تماماً مثل البشر، الكائنات لها دورة حياة.<br />
                                    1. <strong>الميلاد (Constructor)</strong>: إعداد البيانات والموارد.<br />
                                    2. <strong>الحياة</strong>: القيام بالعمل / استدعاء الدوال.<br />
                                    3. <strong>الموت (Destructor)</strong>: تنظيف الذاكرة وإغلاق الملفات.
                                </span>
                            </p>
                        </LessonPart >

                        <LessonPart title={<>1. Types of Constructors <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">1. أنواع البناؤات</span></>} icon={Icons.GitBranch}>
                            <p>You can create objects in multiple ways by Overloading the constructor.</p>
                            <p className="text-right text-emerald-400 mb-2" dir="rtl">يمكنك إنشاء كائنات بطرق متعددة عن طريق التحميل الزائد للبناء (Overloading).</p>

                            <CodeBlock title="Constructors.cpp" code={`class Robot {
public:
    string name;
    int energy;

    // 1. Default Constructor (No arguments)
    Robot() : name("Unknown"), energy(100) {
        cout << "Default Robot created." << endl;
    }

    // 2. Parameterized Constructor (Custom values)
    // Note: ': name(n)' is an Initialization List (Faster!)
    Robot(string n, int e) : name(n), energy(e) {
        cout << "Custom Robot " << n << " created." << endl;
    }
};

int main() {
    Robot r1;              // Calls Default
    Robot r2("C-3PO", 50); // Calls Parameterized
}`} />
                        </LessonPart>

                        <LessonPart title={<>2. The Copy Constructor (Deep vs Shallow) <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">2. بناء النسخ (العميق ضد السطحي)</span></>} icon={Icons.Copy}>
                            <p className="mb-2">
                                What happens when you do <code>Robot r2 = r1;</code>?
                                By default, C++ copies values byte-for-byte (<strong>Shallow Copy</strong>).
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    ماذا يحدث عندما تقوم بـ <code>Robot r2 = r1;</code>؟
                                    افتراضياً، تنسخ C++ القيم بايت تلو الآخر (<strong>نسخ سطحي</strong>).
                                </span>
                            </p>
                            <p className="text-red-300 font-bold mb-2">
                                DANGER: If your object has a Pointer, Shallow Copy only copies the ADDRESS, not the data!
                                Both objects will point to the SAME memory. Use a <strong>Deep Copy</strong> instead.
                                <br />
                                <span className="block text-red-400 text-right mt-2 font-normal" dir="rtl">
                                    خطر: إذا كان كائنك يحتوي على مؤشر (Pointer)، فالنسخ السطحي ينسخ فقط العنوان، وليس البيانات!
                                    سيشير كلا الكائنين إلى نفس الذاكرة. استخدم <strong>نسخاً عميقاً (Deep Copy)</strong> بدلاً من ذلك.
                                </span>
                            </p>
                            <CodeBlock title="DeepCopy.cpp" code={`class Player {
    int* health; // Pointer to Heap memory
public:
    Player(int h) {
        health = new int(h); // Allocate memory
    }

    // Custom Copy Constructor (Deep Copy)
    Player(const Player& other) {
        // create NEW memory, then copy the VALUE
        health = new int(*other.health); 
        cout << "Deep Copy Made!" << endl;
    }

    ~Player() {
        delete health; // If we shallow copied, this would crash!
    }
};

int main() {
    Player p1(100);
    Player p2 = p1; // Calls Copy Constructor
    // p1 and p2 have totally separate health bars now.
}`} />
                        </LessonPart>

                        <LessonPart title={<>3. The Rule of Three (Assignment Operator) <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">3. قاعدة الثلاثة</span></>} icon={Icons.AlertTriangle}>
                            <p>
                                If you need a custom <strong>Destructor</strong> (to delete memory) or a custom <strong>Copy Constructor</strong> (for deep copy), you almost ALWAYS need a custom <strong>Assignment Operator</strong> too.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    إذا كنت بحاجة إلى <strong>هادم (Destructor)</strong> مخصص (لحذف الذاكرة) أو <strong>بناء نسخ (Copy Constructor)</strong> مخصص (للنسخ العميق)، فأنت دائماً تقريباً بحاجة إلى <strong>معامل إسناد (Assignment Operator)</strong> مخصص أيضاً.
                                </span>
                            </p>
                            <p className="mt-2 text-sm text-slate-400">
                                Copy Constructor is used for `Player p2 = p1;` (Creation).
                                <br />Assignment Operator is used for `p2 = p1;` (Update existing object).
                                <span className="block text-emerald-400 text-right mt-1" dir="rtl">
                                    يستخدم بناء النسخ في `Player p2 = p1;` (إنشاء).
                                    <br />يستخدم معامل الإسناد في `p2 = p1;` (تحديث كائن موجود).
                                </span>
                            </p>
                            <CodeBlock title="RuleOfThree.cpp" code={`// 1. Destructor
~Player() { delete health; }

// 2. Copy Constructor
Player(const Player& other) {
    health = new int(*other.health);
}

// 3. Copy Assignment Operator
Player& operator=(const Player& other) {
    if (this == &other) return *this; // Handle self-assignment (p1 = p1)
    
    delete health; // Free old memory
    health = new int(*other.health); // Allocate new
    
    return *this;
}`} />

                        <LessonPart title={<>What is a Pointer? <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">ما هو المؤشر؟</span></>} icon={Icons.Microscope}>

                                <br />

                                </span>
                            </p>
                            <p className="mt-2">

                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">

                        <LessonPart title={<>References: The Safer Pointer <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">المراجع: المؤشر الأكثر أماناً</span></>} icon={Icons.Shield}>

                        <LessonPart title={<>Pointers to Objects & The Arrow Operator <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">المؤشرات للكائنات ومعامل السهم</span></>} icon={Icons.ChevronRight}>
                            <p>
                                When you have a <strong>pointer to an object</strong>, you can't use the dot operator (<code>.</code>) to access its members.
                                Instead, you use the <strong>Arrow Operator</strong> (<code>{"->"}</code>), which is a shortcut for <code>{"(*ptr).member"}</code>.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    عندما يكون لديك <strong>مؤشر لكائن</strong>، لا يمكنك استخدام معامل النقطة (<code>.</code>) للوصول إلى أعضائه.
                                    بدلاً من ذلك، تستخدم <strong>معامل السهم</strong> (<code>{"->"}</code>)، وهو اختصار لـ <code>{"(*ptr).member"}</code>.
                                </span>
                            </p>
                            <CodeBlock title="ArrowOperator.cpp" code={`#include <iostream>
using namespace std;

class Player {
public:
    string name;
    int health;
    
    Player(string n, int h) : name(n), health(h) {}
    
    void takeDamage(int dmg) {
        health -= dmg;
        cout << name << " took " << dmg << " damage! HP: " << health << endl;
    }
    
    void heal(int amount) {
        health += amount;
        cout << name << " healed " << amount << "! HP: " << health << endl;
    }
};

int main() {
    // Stack object: use DOT operator
    Player p1("Ali", 100);
    p1.takeDamage(20);        // Ali took 20 damage! HP: 80

    // Heap object: use ARROW operator
    Player* p2 = new Player("Sara", 100);
    p2->takeDamage(30);       // Sara took 30 damage! HP: 70
    p2->heal(10);             // Sara healed 10! HP: 80

    // Arrow is shortcut for:
    (*p2).takeDamage(5);      // Same thing, but uglier

    delete p2; // Don't forget!
}`} />

                        <LessonPart title={<>The 'this' Pointer <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">مؤشر 'this'</span></>} icon={Icons.Target}>
                            <p>
                                Inside every non-static member function, C++ automatically provides a hidden pointer called <code>this</code>.
                                It points to <strong>the object that called the function</strong>. Think of it as "a pointer to myself."
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    داخل كل دالة عضو غير ساكنة، توفر C++ تلقائياً مؤشراً مخفياً يسمى <code>this</code>.
                                    يشير إلى <strong>الكائن الذي استدعى الدالة</strong>. فكر فيه كـ "مؤشر لنفسي."
                                </span>
                            </p>
                            <CodeBlock title="ThisPointer.cpp" code={`class Enemy {
    string name;
    int hp;
public:
    // 'this' resolves name conflicts between
    // parameter 'name' and member 'name'
    Enemy(string name, int hp) {
        this->name = name;  // this->name = member
        this->hp = hp;      // name = parameter
    }

    // Returning *this enables METHOD CHAINING
    Enemy& setName(string name) {
        this->name = name;
        return *this;  // Return the object itself
    }

    Enemy& setHP(int hp) {
        this->hp = hp;
        return *this;
    }

    void print() {
        cout << name << " (HP: " << hp << ")" << endl;
    }
};

int main() {
    Enemy goblin("Goblin", 50);
    
    // Method Chaining (like jQuery!)
    goblin.setName("Elite Goblin").setHP(200);
    goblin.print();  // Elite Goblin (HP: 200)
    
    // Without 'this', the above would be impossible.
}`} />

                            <VocabCard
                                term={<>this <span className="text-sm text-purple-400 ml-2" dir="rtl">مؤشر this</span></>}
                                definition={<>
                                    An implicit pointer available in all non-static member functions. It always points to the object on which the method was called. Type: ClassName* const (cannot change where it points).
                                    <span className="block text-emerald-400 text-right mt-2" dir="rtl">مؤشر ضمني متاح في جميع دوال الأعضاء غير الساكنة. يشير دائماً إلى الكائن الذي تم استدعاء الدالة عليه. النوع: ClassName* const (لا يمكن تغيير ما يشير إليه).</span>
                                </>}
                            />

    int data[3][3];
public:

                        <LessonPart title={<>Polymorphism: The #1 Reason for Pointers in OOP <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">تعدد الأشكال: السبب الأول لاستخدام المؤشرات في OOP</span></>} icon={Icons.RefreshCw}>
                            <p>
                                <strong>This is the MOST IMPORTANT use of pointers in OOP.</strong> Polymorphism only works through
                                <strong> pointers or references</strong> to a base class. Without pointers, you cannot write flexible,
                                extensible OOP code.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    <strong>هذا هو الاستخدام الأهم للمؤشرات في OOP.</strong> تعدد الأشكال يعمل فقط عبر
                                    <strong> المؤشرات أو المراجع</strong> للفئة الأساسية. بدون المؤشرات، لا يمكنك كتابة كود OOP مرن وقابل للتوسع.
                                </span>
                            </p>

                            <CodeBlock title="PolymorphismWithPointers.cpp" code={`#include <iostream>
#include <vector>
using namespace std;

class Shape {
public:
    virtual double area() const = 0;   // Pure virtual
    virtual void draw() const = 0;
    virtual ~Shape() {}                 // Virtual destructor!
};

class Circle : public Shape {
    double radius;
public:
    Circle(double r) : radius(r) {}
    double area() const override { return 3.14159 * radius * radius; }
    void draw() const override { cout << "Drawing Circle (r=" << radius << ")" << endl; }
};

class Rectangle : public Shape {
    double w, h;
public:
    Rectangle(double w, double h) : w(w), h(h) {}
    double area() const override { return w * h; }
    void draw() const override { cout << "Drawing Rect (" << w << "x" << h << ")" << endl; }
};

class Triangle : public Shape {
    double base, height;
public:
    Triangle(double b, double h) : base(b), height(h) {}
    double area() const override { return 0.5 * base * height; }
    void draw() const override { cout << "Drawing Triangle" << endl; }
};

// THIS FUNCTION WORKS WITH ANY SHAPE — past, present, or future!
void renderScene(const vector<Shape*>& shapes) {
    double totalArea = 0;
    for (const Shape* s : shapes) {
        s->draw();           // Calls the RIGHT draw() via vTable
        totalArea += s->area();
    }
    cout << "Total area: " << totalArea << endl;
}

int main() {
    // Create different shapes via base class pointers
    vector<Shape*> scene;
    scene.push_back(new Circle(5));
    scene.push_back(new Rectangle(4, 6));
    scene.push_back(new Triangle(3, 8));

    renderScene(scene);  // Polymorphic magic!

    // Cleanup
    for (Shape* s : scene) delete s;
}`} />

                            <p className="text-red-400 font-bold mt-2">
                                ⚠️ KEY INSIGHT: If you used <code>Shape s</code> instead of <code>{"Shape* s"}</code>, polymorphism would NOT work. The object would be "sliced" — losing its derived data.
                                <span className="block text-emerald-400 text-right mt-1" dir="rtl">
                                    ⚠️ ملاحظة مهمة: إذا استخدمت <code>Shape s</code> بدلاً من <code>{"Shape* s"}</code>، فلن يعمل تعدد الأشكال. سيتم "تقطيع" الكائن — فقدان بيانات الفئة المشتقة.
                                </span>
                            </p>

                            <CodeBlock title="ObjectSlicing.cpp" code={`// ❌ WRONG: Object Slicing
void drawBad(Shape shape) {   // Copies ONLY the Shape part!
    shape.draw();              // Always calls Shape::draw()
}

// ✅ CORRECT: Use pointer or reference
void drawGood(Shape* shape) {
    shape->draw();             // Calls the REAL draw() (Circle, Rect...)
}

void drawAlsoGood(const Shape& shape) {
    shape.draw();              // Also works with references!
}

int main() {
    Circle c(10);
    // drawBad(c);   // SLICED! Circle data is lost
    drawGood(&c);    // ✅ Circle::draw() is called
    drawAlsoGood(c); // ✅ Circle::draw() is called
}`} />
                        </LessonPart>

                        <LessonPart title={<>Dynamic Arrays of Objects <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">مصفوفات ديناميكية من الكائنات</span></>} icon={Icons.Database}>
                            <p>
                                In real applications, you often don't know how many objects you'll need at compile time.
                                Games need to spawn enemies dynamically. Servers handle variable numbers of clients.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    في التطبيقات الحقيقية، غالباً لا تعرف كم عدد الكائنات التي ستحتاجها وقت الترجمة.
                                    الألعاب تحتاج لإنشاء أعداء ديناميكياً. الخوادم تتعامل مع أعداد متغيرة من العملاء.
                                </span>
                            </p>
                            <CodeBlock title="DynamicObjectArrays.cpp" code={`#include <iostream>
#include <vector>
using namespace std;

class Bullet {
    float x, y;
    float speed;
    bool active;
public:
    Bullet(float x, float y, float spd) 
        : x(x), y(y), speed(spd), active(true) {}
    
    void update() {
        if (active) {
            y += speed;
            cout << "Bullet at (" << x << ", " << y << ")" << endl;
        }
    }
    
    bool isOffScreen() { return y > 600; }
    void deactivate() { active = false; }
};

int main() {
    // Vector of pointers — each bullet is on the Heap
    vector<Bullet*> bullets;
    
    // Player shoots 3 bullets
    bullets.push_back(new Bullet(100, 0, 5.0));
    bullets.push_back(new Bullet(200, 0, 7.0));
    bullets.push_back(new Bullet(300, 0, 3.0));
    
    // Game loop (simplified)
    for (int frame = 0; frame < 5; frame++) {
        cout << "--- Frame " << frame << " ---" << endl;
        for (Bullet* b : bullets) {
            b->update();
        }
    }
    
    // Cleanup: delete every bullet
    for (Bullet* b : bullets) delete b;
    bullets.clear();
}`} />

                        <LessonPart title={<>Smart Pointers with OOP Objects <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">المؤشرات الذكية مع كائنات OOP</span></>} icon={Icons.Shield}>
                            <p>
                                In modern C++, you should <strong>almost never use raw <code>new</code>/<code>delete</code></strong> with objects.
                                Instead, use <code>unique_ptr</code> and <code>shared_ptr</code> — they automatically clean up objects when no longer needed.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    في C++ الحديثة، يجب أن <strong>لا تستخدم تقريباً أبداً <code>new</code>/<code>delete</code> الخام</strong> مع الكائنات.
                                    بدلاً من ذلك، استخدم <code>unique_ptr</code> و <code>shared_ptr</code> — فهي تنظف الكائنات تلقائياً.
                                </span>
                            </p>
                            <CodeBlock title="SmartPtrOOP.cpp" code={`#include <iostream>
#include <memory>
#include <vector>
using namespace std;

class Weapon {
    string name;
    int damage;
public:
    Weapon(string n, int d) : name(n), damage(d) {
        cout << "⚔ " << name << " created." << endl;
    }
    ~Weapon() {
        cout << "🗑 " << name << " destroyed." << endl;
    }
    void attack() { cout << name << " deals " << damage << " damage!" << endl; }
    string getName() { return name; }
};

int main() {
    // ===== unique_ptr: ONE OWNER =====
    cout << "=== unique_ptr ===" << endl;
    {
        unique_ptr<Weapon> sword = make_unique<Weapon>("Excalibur", 50);
        sword->attack();
        // No delete needed! Destroyed at end of scope.
    } // "Excalibur destroyed" printed here automatically!

    cout << endl;

    // ===== shared_ptr: MULTIPLE OWNERS =====
    cout << "=== shared_ptr ===" << endl;
    shared_ptr<Weapon> bow;
    {
        shared_ptr<Weapon> w = make_shared<Weapon>("Golden Bow", 30);
        bow = w;  // Two owners now (count = 2)
        cout << "Ref count: " << bow.use_count() << endl; // 2
    }
    // 'w' died, but bow still alive (count = 1)
    bow->attack();  // Still works!
    cout << "Ref count: " << bow.use_count() << endl; // 1
    // bow dies at end of main -> "Golden Bow destroyed"
}`} />

                            <CodeBlock title="SmartPtrPolymorphism.cpp" code={`// ✅ BEST PRACTICE: Smart pointers + Polymorphism
class Animal {
public:
    virtual void speak() = 0;
    virtual ~Animal() {}
};

class Dog : public Animal {
public:
    void speak() override { cout << "Woof!" << endl; }
};

class Cat : public Animal {
public:
    void speak() override { cout << "Meow!" << endl; }
};

int main() {
    // Vector of unique_ptr to base class — NO memory leaks possible!
    vector<unique_ptr<Animal>> zoo;
    
    zoo.push_back(make_unique<Dog>());
    zoo.push_back(make_unique<Cat>());
    zoo.push_back(make_unique<Dog>());
    
    for (const auto& animal : zoo) {
        animal->speak();  // Polymorphic + memory safe!
    }
    // ALL animals automatically deleted when vector goes out of scope
    // No delete calls needed anywhere!
}`} />
                        </LessonPart>

                        <LessonPart title={<>Factory Pattern: Creating Objects Dynamically <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">نمط المصنع: إنشاء كائنات ديناميكياً</span></>} icon={Icons.Settings}>
                            <p>
                                The <strong>Factory Pattern</strong> is one of the most used design patterns in OOP. It uses pointers to create
                                objects dynamically based on some input — the caller doesn't need to know the exact type.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    <strong>نمط المصنع (Factory Pattern)</strong> هو أحد أكثر أنماط التصميم استخداماً في OOP. يستخدم المؤشرات لإنشاء
                                    كائنات ديناميكياً بناءً على مدخل ما — المستدعي لا يحتاج لمعرفة النوع الدقيق.
                                </span>
                            </p>
                            <CodeBlock title="FactoryPattern.cpp" code={`#include <iostream>
#include <memory>
using namespace std;

// Base class
class Enemy {
public:
    virtual void attack() = 0;
    virtual int getHP() = 0;
    virtual ~Enemy() {}
};

class Goblin : public Enemy {
public:
    void attack() override { cout << "Goblin scratches! (5 dmg)" << endl; }
    int getHP() override { return 30; }
};

class Dragon : public Enemy {
public:
    void attack() override { cout << "Dragon breathes fire! (100 dmg)" << endl; }
    int getHP() override { return 500; }
};

class Skeleton : public Enemy {
public:
    void attack() override { cout << "Skeleton slashes! (15 dmg)" << endl; }
    int getHP() override { return 50; }
};

// 🏭 THE FACTORY — decides WHICH object to create
unique_ptr<Enemy> createEnemy(const string& type) {
    if (type == "goblin")   return make_unique<Goblin>();
    if (type == "dragon")   return make_unique<Dragon>();
    if (type == "skeleton") return make_unique<Skeleton>();
    return nullptr;
}

int main() {
    // The caller doesn't know or care about Goblin, Dragon, etc.
    // It only works with Enemy pointers!
    auto e1 = createEnemy("dragon");
    auto e2 = createEnemy("goblin");
    auto e3 = createEnemy("skeleton");
    
    // All called through base class pointer
    e1->attack();  // Dragon breathes fire!
    e2->attack();  // Goblin scratches!
    e3->attack();  // Skeleton slashes!
    
    cout << "Dragon HP: " << e1->getHP() << endl;  // 500
}`} />
                        </LessonPart>

                        <LessonPart title={<>Composition: Objects Owning Objects via Pointers <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">التركيب: كائنات تمتلك كائنات عبر المؤشرات</span></>} icon={Icons.Box}>
                            <p>
                                Real OOP systems are built by composing objects together. A <code>Car</code> HAS-A <code>Engine</code>.
                                A <code>Player</code> HAS-A <code>Weapon</code>. Pointers allow you to create, swap, and share these owned objects dynamically.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    أنظمة OOP الحقيقية تُبنى بتجميع الكائنات معاً. <code>Car</code> لديها <code>Engine</code>.
                                    <code>Player</code> لديه <code>Weapon</code>. المؤشرات تسمح لك بإنشاء وتبديل ومشاركة هذه الكائنات المملوكة ديناميكياً.
                                </span>
                            </p>
                            <CodeBlock title="Composition.cpp" code={`#include <iostream>
#include <memory>
using namespace std;

class Weapon {
    string name;
    int damage;
public:
    Weapon(string n, int d) : name(n), damage(d) {}
    int getDamage() { return damage; }
    string getName() { return name; }
};

class Armor {
    string name;
    int defense;
public:
    Armor(string n, int d) : name(n), defense(d) {}
    int getDefense() { return defense; }
    string getName() { return name; }
};

class Character {
    string name;
    int hp;
    // Composition: Character OWNS a Weapon and Armor
    unique_ptr<Weapon> weapon;
    unique_ptr<Armor> armor;
    
public:
    Character(string n, int h) : name(n), hp(h) {}
    
    // Equip new weapon (transfers ownership)
    void equip(unique_ptr<Weapon> w) {
        weapon = move(w);  // Transfer ownership to this character
        cout << name << " equipped " << weapon->getName() << "!" << endl;
    }
    
    void equip(unique_ptr<Armor> a) {
        armor = move(a);
        cout << name << " put on " << armor->getName() << "!" << endl;
    }
    
    void attack() {
        if (weapon) {
            cout << name << " attacks with " << weapon->getName() 
                 << " for " << weapon->getDamage() << " damage!" << endl;
        } else {
            cout << name << " punches for 1 damage!" << endl;
        }
    }
    
    void showStats() {
        cout << "=== " << name << " ===" << endl;
        cout << "HP: " << hp << endl;
        cout << "Weapon: " << (weapon ? weapon->getName() : "None") << endl;
        cout << "Armor: " << (armor ? armor->getName() : "None") << endl;
    }
};

int main() {
    Character hero("Knight", 100);
    
    hero.attack();  // Punches for 1 damage (no weapon)
    
    // Create and equip
    hero.equip(make_unique<Weapon>("Dragon Slayer", 75));
    hero.equip(make_unique<Armor>("Mithril Plate", 50));
    
    hero.attack();      // Attacks with Dragon Slayer for 75 damage!
    hero.showStats();
    
    // Swap weapon
    hero.equip(make_unique<Weapon>("Ice Staff", 40));
    hero.attack();      // Attacks with Ice Staff for 40 damage!
    // Old weapon automatically deleted by unique_ptr!
}`} />
                        </LessonPart>

                        <LessonPart title={<>Pointer-Based Callbacks & Strategy Pattern <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">الاستدعاءات الراجعة ونمط الاستراتيجية عبر المؤشرات</span></>} icon={Icons.TrendingUp}>
                            <p>
                                Pointers let you change object behavior at runtime by swapping strategy objects.
                                This is called the <strong>Strategy Pattern</strong> — one of the most powerful OOP design patterns.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    المؤشرات تسمح لك بتغيير سلوك الكائن وقت التشغيل عن طريق تبديل كائنات الاستراتيجية.
                                    يُسمى هذا <strong>نمط الاستراتيجية (Strategy Pattern)</strong> — أحد أقوى أنماط تصميم OOP.
                                </span>
                            </p>
                            <CodeBlock title="StrategyPattern.cpp" code={`class SortStrategy {
public:
    virtual void sort(vector<int>& data) = 0;
    virtual string name() = 0;
    virtual ~SortStrategy() {}
};

class BubbleSort : public SortStrategy {
public:
    void sort(vector<int>& data) override {
        for (int i = 0; i < data.size(); i++)
            for (int j = 0; j < data.size()-1; j++)
                if (data[j] > data[j+1]) swap(data[j], data[j+1]);
    }
    string name() override { return "Bubble Sort"; }
};

class QuickSort : public SortStrategy {
public:
    void sort(vector<int>& data) override {
        std::sort(data.begin(), data.end()); // Simplified
    }
    string name() override { return "Quick Sort"; }
};

class DataProcessor {
    unique_ptr<SortStrategy> strategy; // Pointer to strategy
public:
    // Swap strategy at runtime!
    void setStrategy(unique_ptr<SortStrategy> s) {
        strategy = move(s);
        cout << "Strategy set to: " << strategy->name() << endl;
    }
    
    void process(vector<int>& data) {
        if (strategy) {
            strategy->sort(data);
            cout << "Sorted: ";
            for (int x : data) cout << x << " ";
            cout << endl;
        }
    }
};

int main() {
    DataProcessor dp;
    vector<int> data = {5, 2, 8, 1, 9, 3};
    
    // Use Bubble Sort
    dp.setStrategy(make_unique<BubbleSort>());
    dp.process(data);
    
    // Switch to Quick Sort at runtime!
    data = {5, 2, 8, 1, 9, 3};
    dp.setStrategy(make_unique<QuickSort>());
    dp.process(data);
}`} />

                            <p>
                                So far, every object has had its own copy of variables. If you create 10 Robots, you have 10 `energy` variables.
                                <br />But what if you want a variable that is <strong>Shared</strong> by ALL objects?
                                <br />This is where <code>static</code> comes in.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    حتى الآن، كان لكل كائن نسخته الخاصة من المتغيرات. إذا أنشأت 10 روبوتات، فلديك 10 متغيرات `energy`.
                                    <br />ولكن ماذا لو كنت تريد متغيراً <strong>مشتركاً</strong> بين جميع الكائنات؟

                        <LessonPart title={<>1. Static Variables <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">1. المتغيرات الساكنة</span></>} icon={Icons.Database}>
                            <p>
                                A static variable belongs to the <strong>Class</strong>, not the Object.
                                It is stored in a special memory area (Global/Static memory), not in the Heap or Stack of the object.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    المتغير الساكن ينتمي إلى <strong>الفئة (Class)</strong>، وليس الكائن.
                                    يتم تخزينه في منطقة ذاكرة خاصة (ذاكرة عامة/ساكنة)، وليس في الـ Heap أو Stack الخاص بالكائن.
                                </span>
                            </p>
                            <div className="bg-slate-900 p-4 rounded border-l-4 border-yellow-500 my-4">
                                <h4 className="text-yellow-400 font-bold text-sm">Initialization Rule</h4>
                                <p className="text-xs text-slate-300 mt-1">
                                    You declare it inside the class, but you MUST define/initialize it <strong>outside</strong> the class.
                                    <br />
                                    <span className="block text-emerald-400 text-right mt-1" dir="rtl">
                                        تعلن عنه داخل الفئة، ولكن يجب عليك تعريفه/تهيئته <strong>خارج</strong> الفئة.
                                    </span>
                                </p>
                            </div>
                            <CodeBlock title="StaticVar.cpp" code={`class User {
public:
    string name;
    // Declaration
    static int userCount; 

    User(string n) : name(n) {
        userCount++; // Increment shared counter
    }
};

// Definition (Required!)
int User::userCount = 0;

int main() {
    User u1("Ali");
    User u2("Sara");
    User u3("Mona");

    // Access via Class Name (Recommended)
    cout << User::userCount; // 3
    
    // Access via Object (Works, but confusing)
    cout << u1.userCount;    // 3 (It's the same variable!)
}`} />
                        </LessonPart>

                        <LessonPart title={<>2. Static Methods <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">2. الدوال الساكنة</span></>} icon={Icons.Terminal}>
                            <p>
                                A static method can be called <strong>without creating an object</strong>.
                                <br />Example: <code>Math::sqrt(9)</code>. You don't create a `Math` object to do math.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    يمكن استدعاء الدالة الساكنة <strong>دون إنشاء كائن</strong>.
                                    <br />مثال: <code>Math::sqrt(9)</code>. لا تنشئ كائن `Math` للقيام بعمليات رياضية.
                                </span>
                            </p>
                            <p className="mt-2 text-red-300 font-bold text-sm">
                                Constraint: Static methods can ONLY access Static variables. They cannot access `this`, `name`, or `age` because they don't know which object called them.
                                <br />
                                <span className="block text-red-400 text-right mt-1 font-normal" dir="rtl">
                                    قيد: الدوال الساكنة يمكنها فقط الوصول إلى المتغيرات الساكنة. لا يمكنها الوصول إلى `this` أو `name` أو `age` لأنها لا تعرف أي كائن استدعاها.
                                </span>
                            </p>
                            <CodeBlock title="StaticMethod.cpp" code={`class Converter {
public:
    // Normal variable
    int factor = 10; 

    // Static Method
    static int toSeconds(int minutes) {
        return minutes * 60;
        // return minutes * factor; // ERROR! Cannot access non-static 'factor'
    }
};

int main() {
    // No object needed!
    cout << Converter::toSeconds(5); // 300
}`} />
                        </LessonPart>

                        <LessonPart title={<>3. Static Objects & Constants <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">3. الكائنات والثوابت الساكنة</span></>} icon={Icons.Box}>
                            <p>
                                <strong>Static Objects:</strong> Created only once and live until the program ends, regardless of scope.
                                <br />
                                <strong>Static Constants:</strong> Can be initialized inside the class if they are `const int`.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">
                                    <strong>الكائنات الساكنة:</strong> تنشأ مرة واحدة فقط وتعيش حتى ينتهي البرنامج، بغض النظر عن النطاق.
                                    <br />
                                    <strong>الثوابت الساكنة:</strong> يمكن تهيئتها داخل الفئة إذا كانت `const int`.
                                </span>
                            </p>
                            <CodeBlock title="StaticConst.cpp" code={`class Math {

                                Sometimes, you want to give a specific function or class access to your <code>private</code> members without making them <code>public</code>.

                        <LessonPart title={<>1. Friend Function <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">1. الدالة الصديقة</span></>} icon={Icons.Code}>
                            <p>
                                A standalone function that can access private parts of a class.
                                <br />
                                <span className="block text-emerald-400 text-right mt-2" dir="rtl">

                                </span>
                            </p>
                            <CodeBlock title="FriendFunc.cpp" code={`class Box {
private:
    int width;
public:
    Box(int w) : width(w) {}
    
    // Grant access to printWidth

};

    // Can access private 'width' because it's a friend

}

int main() {
    Box b(10);
    printWidth(b);
}`} />

                        <LessonPart title={<>The 'Protected' Keyword <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">كلمة 'Protected' المحجوزة</span></>} icon={Icons.Lock}>

                        <CodeBlock title="RPG_Inheritance.cpp" code={`class GameCharacter {
protected: // Visible to Warrior/Mage, but not main()
    string name;
    int hp;

public:
    GameCharacter(string n, int h) : name(n), hp(h) {
        cout << "Character Created: " << name << endl;
    }
    
    void walk() { cout << name << " is walking." << endl; }
};

// Warrior IS-A GameCharacter
class Warrior : public GameCharacter {
public:
    int strength;

    // Must call Parent Constructor first!
    Warrior(string n, int h, int str) : GameCharacter(n, h) {
        strength = str;
        cout << "Warrior Ready!" << endl;
    }

    void attack() {
        // Can access 'name' because it's protected
        cout << name << " attacks with strength " << strength << "!" << endl;
    }
};

int main() {
    Warrior w("Conan", 100, 50);
    w.walk();   // Inherited from Parent
    w.attack(); // Specific to Child
    // w.hp = 0; // ERROR: hp is protected (private to outside)
}`} />

                        <LessonPart title={<>Constructor Chain Order <br /><span className="text-sm text-emerald-400 font-normal" dir="rtl">ترتيب سلسلة البناء</span></>} icon={Icons.RefreshCw}>

                                <div className="bg-blue-900 p-2 rounded border border-blue-500">2. Derived Constructor</div>
                            </div>
